<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫플 (Petple) - 우리 아이 자랑하고 치킨 받자!</title>
    <style>
        body { font-family: 'NanumGothic', sans-serif; margin: 0; padding: 0; background-color: #fdfdfd; color: #333; }
        header { background-color: #fffde7; padding: 20px; text-align: center; border-bottom: 2px solid #e0f2f1; }
        header h1 { color: #ffca28; margin: 0; font-size: 3em; }
        header p { color: #4db6ac; font-size: 1.2em; margin-top: 5px; }
        .container { width: 90%; max-width: 800px; margin: 20px auto; padding: 20px; }
        
        /* 메인 카드 스타일 */
        .card { 
            background-color: #fff; padding: 30px; border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; 
            margin-bottom: 20px;
        }

        /* 1등 후보 프리뷰 */
        .ranking-preview { display: block; }
        .dog-photo-main {
            width: 180px; height: 180px; border-radius: 50%; 
            margin: 0 auto 15px; border: 5px solid #ffca28; object-fit: cover;
        }

        /* 투표 섹션 (기본 숨김) */
        #voteSection { display: none; }
        .vote-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .vote-item {
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            padding: 10px;
            border-radius: 10px;
        }
        .vote-item:hover { transform: translateY(-5px); background-color: #fff9c4; border-color: #ffca28; }
        .vote-item img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
        .vote-item h4 { margin: 5px 0; }

        .btn-main {
            background-color: #ffca28; color: white; border: none; padding: 15px 30px;
            font-size: 1.2em; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, background-color 0.3s; width: 100%; margin-top: 20px;
        }
        .btn-main:hover { background-color: #fbc02d; transform: scale(1.02); }

        .result-message {
            display: none; margin-top: 20px; padding: 15px; background-color: #e8f5e9;
            color: #2e7d32; border-radius: 10px; font-weight: bold; font-size: 1.1em;
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>Petple</h1>
        <p>반려동물과 사람이 모이는 곳, 펫플</p>
    </header>

    <div class="container">
        <!-- 1. 초기 랭킹 프리뷰 카드 -->
        <section class="card" id="previewSection">
            <h2>🔥 이번 주 1등 후보</h2>
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=200&h=200&fit=crop" alt="진구 사진" class="dog-photo-main">
            <h3>진구 (3세, 푸들)</h3>
            <p>"우리 진구 너무 귀엽죠? 투표 부탁드려요!"</p>
            <button class="btn-main" onclick="showVoteOptions()">👍 주간 랭킹 투표하기</button>
        </section>

        <!-- 2. 실제 투표 섹션 (버튼 클릭 시 등장) -->
        <section class="card" id="voteSection">
            <h2>🏆 이번 주 랭킹 투표</h2>
            <p>가장 마음에 드는 아이를 선택해주세요!</p>
            <div class="vote-grid">
                <!-- 후보 1 -->
                <div class="vote-item" onclick="submitVote('진구')">
                    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=150&h=150&fit=crop" alt="진구">
                    <h4>1. 진구</h4>
                    <small>푸들 / 3세</small>
                </div>
                <!-- 후보 2 -->
                <div class="vote-item" onclick="submitVote('초코')">
                    <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150&h=150&fit=crop" alt="초코">
                    <h4>2. 초코</h4>
                    <small>비글 / 2세</small>
                </div>
                <!-- 후보 3 -->
                <div class="vote-item" onclick="submitVote('밀크')">
                    <img src="https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?w=150&h=150&fit=crop" alt="밀크">
                    <h4>3. 밀크</h4>
                    <small>말티즈 / 1세</small>
                </div>
            </div>
            <div class="result-message" id="resultMsg"></div>
        </section>
    </div>

    <script>
        // 투표 옵션 보여주기
        function showVoteOptions() {
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('voteSection').style.display = 'block';
        }

        // 투표 제출하기
        function submitVote(name) {
            const resultMsg = document.getElementById('resultMsg');
            resultMsg.style.display = 'block';
            resultMsg.innerHTML = `🎉 ${name}에게 투표 완료!<br>소중한 한 표 감사합니다. 랭킹 결과는 월요일에 발표됩니다!`;
            
            // 다른 후보들 클릭 방지
            const items = document.querySelectorAll('.vote-item');
            items.forEach(item => {
                item.style.pointerEvents = 'none';
                item.style.opacity = '0.7';
            });
            
            setTimeout(() => {
                alert(`${name}에게 투표해주셔서 감사합니다! 🍗`);
            }, 300);
        }
    </script>

</body>
</html>
