<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫플 (Petple) - 우리 아이 자랑하고 치킨 받자!</title>
    <style>
        body { font-family: 'NanumGothic', sans-serif; margin: 0; padding: 0; background-color: #fdfdfd; color: #333; }
        header { background-color: #fffde7; padding: 20px; text-align: center; border-bottom: 2px solid #e0f2f1; }
        header h1 { color: #ffca28; margin: 0; font-size: 3em; }
        header p { color: #4db6ac; font-size: 1.2em; margin-top: 5px; }
        .container { width: 80%; margin: 20px auto; padding: 20px; }
        .ranking-preview { 
            background-color: #fff; padding: 30px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; 
            max-width: 400px; margin: 0 auto;
        }
        .ranking-preview h2 { color: #333; margin-bottom: 20px; }
        .dog-photo {
            width: 150px; height: 150px; border-radius: 50%; 
            margin: 0 auto 15px; border: 5px solid #ffca28; object-fit: cover;
        }
        .btn-vote {
            background-color: #ffca28; color: white; border: none; padding: 15px 30px;
            font-size: 1.2em; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, background-color 0.3s; width: 100%; margin-top: 20px;
        }
        .btn-vote:hover { background-color: #fbc02d; transform: scale(1.05); }
        .result-message {
            display: none; margin-top: 20px; padding: 15px; background-color: #e8f5e9;
            color: #2e7d32; border-radius: 10px; font-weight: bold; font-size: 1.1em;
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>Petple</h1>
        <p>반려동물과 사람이 모이는 곳, 펫플</p>
    </header>

    <div class="container">
        <section class="ranking-preview" id="rankingCard">
            <h2>🔥 이번 주 1등 후보</h2>
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=150&h=150&fit=crop" alt="진구 사진" class="dog-photo" id="dogImage">
            
            <h3 id="dogName">진구 (3세, 푸들)</h3>
            <p>"우리 진구 너무 귀엽죠? 투표 부탁드려요!"</p>
            <p id="likeCount">❤️ 현재 좋아요 1,234개</p>

            <button class="btn-vote" id="voteBtn" onclick="giveVote()">👍 주간 랭킹 투표하기</button>
            
            <div class="result-message" id="resultMsg">
                🎉 축하합니다!<br>진구가 압도적인 표 차이로 1등이 되었습니다!<br>🍗 이번 주 '치킨 기프티콘' 당첨!
            </div>
        </section>
    </div>

    <script>
        // 버튼을 눌렀을 때 실행되는 마법의 코드 (JavaScript)
        function giveVote() {
            // 1. 버튼 숨기기
            document.getElementById('voteBtn').style.display = 'none';
            
            // 2. 좋아요 숫자 올리기
            document.getElementById('likeCount').innerHTML = '❤️ 현재 좋아요 9,999개 (1위 달성!)';
            document.getElementById('likeCount').style.color = '#e91e63';
            document.getElementById('likeCount').style.fontWeight = 'bold';
            
            // 3. 테두리 색상 반짝이게 바꾸기
            document.getElementById('dogImage').style.borderColor = '#e91e63';
            
            // 4. 숨겨둔 1등 당첨 메시지 보여주기
            document.getElementById('resultMsg').style.display = 'block';
            
            // 5. 화면에 폭죽 알림창 띄우기
            setTimeout(function() {
                alert("알림: 진구 견주님께 치킨 기프티콘이 발송되었습니다! 🍗");
            }, 500); // 0.5초 뒤에 알림창 띄우기
        }
    </script>

</body>
</html>
