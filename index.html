<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6421966697163453" crossorigin="anonymous"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">

    <title>🌱 간편한 복리 계산기 - 금융의 마법 가이드</title>
    <meta name="description" content="전문적인 복리 계산기와 재테크 가이드. 초기 투자금, 월 적립액, 수익률 분석.">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');
        :root {
            --bg-color: #f3f4f6; --header-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --real-value-color: #db2777;
            --border-color: #e5e7eb; --input-bg: #ffffff; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode {
            --bg-color: #0f172a; --header-bg: #1e293b; --card-bg: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-color: #38bdf8; --real-value-color: #f472b6;
            --border-color: #334155; --input-bg: #0f172a; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; transition: all 0.5s; color: var(--text-primary); background-color: var(--bg-color); }
        header { background-color: var(--header-bg); padding: 60px 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        header h1 { font-family: 'Noto Serif KR', serif; margin: 0; font-size: 3.2em; color: var(--accent-color); font-weight: 900; }
        .mode-toggle { position: absolute; top: 20px; right: 30px; background: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 16px; cursor: pointer; font-weight: 800; }
        .container { width: 95%; max-width: 1200px; margin: 40px auto 80px; padding: 0 20px; box-sizing: border-box; }
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        .card { background-color: var(--card-bg); padding: 30px; border-radius: 32px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9em; color: var(--text-secondary); }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 1.1em; box-sizing: border-box; }
        .btn-calc { width: 100%; background: var(--accent-color); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.2em; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .btn-sub { width: 100%; padding: 14px; border-radius: 16px; background: none; border: 2px solid var(--accent-color); color: var(--accent-color); font-weight: 800; cursor: pointer; margin-bottom: 12px; }
        .res-box { padding: 25px; border-radius: 24px; background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 20px; }
        .res-value { font-size: 2em; font-weight: 900; word-break: break-all; }
        .chart-container { position: relative; flex-grow: 1; min-height: 450px; width: 100%; margin-top: 25px; }
        .ad-area { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.02); border: 1px dashed var(--border-color); border-radius: 24px; text-align: center; }
        .knowledge-section { margin-top: 60px; }
        .knowledge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .knowledge-card { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); }
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid var(--border-color); margin-top: 80px; }
        .sub-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 3000; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .sub-modal.active { display: block; }
        #customAlert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 4000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 32px; max-width: 600px; width: 90%; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="customAlert"><div class="modal-content"><div id="modalBody"></div><div style="text-align:center; margin-top:30px;"><button class="btn-calc" onclick="closeAlert()" style="padding:12px 40px;">닫기</button></div></div></div>

    <div id="compareModal" class="sub-modal">
        <button class="btn-sub" onclick="closeSubModal('compareModal')" style="width:auto;">← 돌아가기</button>
        <div class="container">
            <h2>단리 vs 복리 비교</h2>
            <div class="card"><div style="height: 350px;"><canvas id="compareChart"></canvas></div></div>
        </div>
    </div>

    <div id="goalModal" class="sub-modal">
        <button class="btn-sub" onclick="closeSubModal('goalModal')" style="width:auto;">← 돌아가기</button>
        <div class="container">
            <h2>목표 금액 역계산</h2>
            <div class="card">
                <div class="input-group"><label>목표 금액 (원)</label><input type="text" id="targetAmt" oninput="handleInput(this)"></div>
                <div class="input-group"><label>기간 (년)</label><input type="number" id="targetYears" value="10"></div>
                <div class="input-group"><label>수익률 (%)</label><input type="number" id="targetRate" value="8"></div>
                <button class="btn-calc" onclick="findGoal()">계산하기</button>
                <div id="goalResult" style="margin-top:20px; font-size:1.5em; font-weight:900; text-align:center;"></div>
            </div>
        </div>
    </div>

    <header>
        <button class="mode-toggle" onclick="toggleMode()">🌙 모드 전환</button>
        <h1><span id="magicIcon" onclick="growIcon()">🌱</span> 복리 계산기</h1>
        <div style="margin-top:10px;">환율: 1 USD = <span id="headerUSD">1.350</span> KRW</div>
    </header>

    <div class="container">
        <div class="main-grid">
            <aside class="card">
                <div class="input-group"><label>초기 투자액 (원)</label><input type="text" id="principal" value="10.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>월 적립액 (원)</label><input type="text" id="monthly" value="1.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>수익률 (%)</label><input type="number" id="rate" value="8" step="0.1"></div>
                <div class="input-group"><label>기간 (년)</label><input type="number" id="years" value="10"></div>
                <div class="input-group"><label>물가상승률 (%)</label><input type="number" id="inflation" value="2.5" step="0.1"></div>
                <div class="input-group"><label>세금</label><select id="taxType"><option value="general">일반과세(15.4%)</option><option value="isa">비과세(0%)</option></select></div>
                <button class="btn-calc" onclick="calculate()">분석 시작 💰</button>
                <div style="margin-top:20px;">
                    <button class="btn-sub" onclick="openCompare()">단리 vs 복리 비교</button>
                    <button class="btn-sub" onclick="openGoal()">목표 금액 역계산</button>
                </div>
                <div class="ad-area" id="A1">A1 광고 자리</div>
            </aside>
            <main class="card">
                <div class="res-box"><div>최종 세후 자산</div><div class="res-value" id="totalValue">₩ 0</div></div>
                <div class="res-box" style="border-color:var(--real-value-color);"><div>실질 구매력</div><div class="res-value" id="realValue">₩ 0</div><div id="valUSD" style="font-size:0.5em; color:var(--accent-color);">$0</div></div>
                <div class="chart-container"><canvas id="assetChart"></canvas></div>
                <div class="ad-area" id="A2">A2 광고 자리</div>
            </main>
        </div>

        <section class="knowledge-section">
            <h2>금융 지식 가이드</h2>
            <div class="knowledge-grid">
                <div class="knowledge-card"><h3>72의 법칙</h3><p>자산이 두 배가 되는 시간을 계산하는 공식입니다.</p></div>
                <div class="knowledge-card"><h3>복리의 힘</h3><p>이자에 이자가 붙어 자산이 기하급수적으로 늘어납니다.</p></div>
            </div>
        </section>
    </div>

    <footer>
        <div style="margin-bottom:20px;"><a onclick="showInfo('privacy')" style="cursor:pointer; font-weight:bold;">개인정보처리방침</a></div>
        <p>&copy; 2026 복리 계산기</p>
    </footer>

    <script>
        const $ = id => document.getElementById(id);
        let myChart = null, currentRate = 1350;

        const parseNum = val => {
            if (typeof val === 'number') return val;
            return parseFloat(val.replace(/[^0-9.-]/g, "")) || 0;
        };

        function formatCurrency(num) {
            const n = Math.floor(num);
            if (n < 10000) return '₩ ' + n.toLocaleString();
            const units = ['', '만', '억', '조', '경'];
            let parts = [], temp = n, i = 0;
            while (temp > 0 && i < units.length) {
                let r = temp % 10000;
                if (r > 0) parts.push(r.toLocaleString() + units[i]);
                temp = Math.floor(temp / 10000); i++;
            }
            return parts.reverse().slice(0, 2).join(' ') + ' 원';
        }

        function handleInput(el) {
            let val = el.value.replace(/[^0-9]/g, "");
            el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function calculate(noAnim = false) {
            const P = parseNum($('principal').value), PMT = parseNum($('monthly').value);
            const R = parseNum($('rate').value) / 100 / 12, Y = parseNum($('years').value);
            const INF = parseNum($('inflation').value) / 100, TAX = $('taxType').value === 'general' ? 0.154 : 0;
            
            let cur = P, totalP = P, labels = ['현재'], dNom = [P], dReal = [P];
            for (let y = 1; y <= Y; y++) {
                for (let m = 1; m <= 12; m++) {
                    let intr = cur * R;
                    cur += (intr * (1 - TAX)) + PMT;
                    totalP += PMT;
                }
                labels.push(y + '년');
                dNom.push(cur);
                dReal.push(cur / Math.pow(1 + INF, y));
            }

            if (noAnim) {
                $('totalValue').innerText = formatCurrency(cur);
                $('realValue').innerText = formatCurrency(dReal[dReal.length - 1]);
                $('valUSD').innerText = '$' + Math.floor(dReal[dReal.length - 1] / currentRate).toLocaleString();
            } else {
                animateNumber($('totalValue'), cur);
                animateNumber($('realValue'), dReal[dReal.length - 1]);
                animateNumber($('valUSD'), dReal[dReal.length - 1] / currentRate, true);
            }
            updateChart(labels, dNom, dReal);
        }

        function animateNumber(el, target, isUSD = false) {
            const start = parseNum(el.innerText);
            const duration = 800, startTime = performance.now();
            function up(now) {
                const p = Math.min((now - startTime) / duration, 1);
                const val = start + (target - start) * p;
                el.innerText = isUSD ? '$' + Math.floor(val).toLocaleString() : formatCurrency(val);
                if (p < 1) requestAnimationFrame(up);
            }
            requestAnimationFrame(up);
        }

        function updateChart(labels, nominal, real) {
            const ctx = $('assetChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: '명목 자산', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.1)', fill: true },
                        { label: '실질 가치', data: real, borderColor: '#db2777', borderDash: [5, 5] }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function toggleMode() {
            document.body.classList.toggle('dark-mode');
            calculate(true);
        }

        function openCompare() {
            $('compareModal').classList.add('active');
            // 단순 구현
        }
        function openGoal() { $('goalModal').classList.add('active'); }
        function closeSubModal(id) { $(id).classList.remove('active'); }
        function closeAlert() { $('customAlert').style.display = 'none'; }
        function showInfo(t) { $('modalBody').innerHTML = t === 'privacy' ? '<h3>개인정보처리방침</h3><p>데이터를 저장하지 않습니다.</p>' : ''; $('customAlert').style.display = 'flex'; }

        window.onload = () => { calculate(true); };
    </script>
</body>
</html>
