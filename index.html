<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneCalc Pro - 복리 & 절세 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');
        :root {
            --bg-color: #f3f4f6; --header-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --real-value-color: #db2777;
            --tax-color: #059669; --border-color: #e5e7eb;
            --input-bg: #ffffff; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode {
            --bg-color: #0f172a; --header-bg: #1e293b; --card-bg: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-color: #38bdf8; --real-value-color: #f472b6;
            --tax-color: #34d399; --border-color: #334155;
            --input-bg: #0f172a; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-primary); transition: all 0.3s; line-height: 1.6; }
        header { background-color: var(--header-bg); padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; }
        header h1 { font-family: 'Noto Serif KR', serif; margin: 0; font-size: 2.2em; color: var(--accent-color); }
        .mode-toggle { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; cursor: pointer; color: var(--text-primary); font-size: 0.85em; }
        .container { width: 95%; max-width: 1100px; margin: 20px auto 60px; padding: 0 20px; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85em; color: var(--text-secondary); }
        .input-group input, .input-group select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 1em; box-sizing: border-box; outline: none; }
        .tax-box { background-color: rgba(37, 99, 235, 0.05); padding: 16px; border-radius: 12px; border: 1px solid rgba(37, 99, 235, 0.1); margin-top: 20px; }
        .btn-calc { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1em; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-calc:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .result-header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 600px) { .result-header { grid-template-columns: 1fr; } }
        .res-box { padding: 20px; border-radius: 16px; background: rgba(0,0,0,0.02); border: 1px solid var(--border-color); }
        .res-label { font-size: 0.85em; color: var(--text-secondary); margin-bottom: 4px; }
        .res-value { font-size: 1.8em; font-weight: 800; }
        .val-nominal { color: var(--accent-color); }
        .val-real { color: var(--real-value-color); }
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .stat-small { font-size: 0.85em; }
        .stat-small .label { color: var(--text-secondary); }
        .stat-small .value { display: block; font-weight: 700; font-size: 1.1em; }
        .tax-info { font-size: 0.8em; color: var(--text-secondary); margin-top: 15px; background: #fffbeb; padding: 10px; border-radius: 8px; border: 1px solid #fef3c7; color: #92400e; }
        body.dark-mode .tax-info { background: #451a03; color: #fde68a; border-color: #78350f; }
        #comparisonBanner { display: none; margin-top: 24px; padding: 20px; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border-radius: 16px; text-align: center; animation: slideUp 0.5s ease-out; }
        .banner-title { font-weight: 800; font-size: 1.1em; margin-bottom: 8px; }
        .banner-desc { font-size: 0.9em; opacity: 0.9; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #customAlert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); max-width: 400px; width: 80%; text-align: center; border: 1px solid var(--border-color); transform: scale(0.9); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        #customAlert.active .modal-content { transform: scale(1); opacity: 1; }
        .modal-title { font-size: 1.3em; font-weight: 700; color: #ef4444; margin-bottom: 15px; }
        .modal-msg { color: var(--text-primary); margin-bottom: 25px; line-height: 1.6; }
        .btn-modal { background: var(--accent-color); color: white; border: none; padding: 12px 40px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-modal:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="customAlert"><div class="modal-content"><div class="modal-title" id="modalTitle">⚠️ 알림</div><div class="modal-msg" id="modalMsg"></div><button class="btn-modal" onclick="closeAlert()">확인</button></div></div>
    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1>FortuneCalc Pro</h1>
        <p>복리, 인플레이션, 세금까지 고려한 실질 자산 시뮬레이션</p>
    </header>
    <div class="container">
        <div class="main-grid">
            <aside class="card">
                <div class="input-group"><label>초기 투자액 (원)</label><input type="text" id="principal" value="10.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>월 추가 적립액 (원)</label><input type="text" id="monthly" value="1.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>연 예상 수익률 (%)</label><input type="number" id="rate" value="8" step="0.1" oninput="calculate()"></div>
                <div class="input-group"><label>투자 기간 (년)</label><input type="number" id="years" value="10" oninput="calculate()"></div>
                <div class="input-group"><label>연 물가상승률 (%)</label><input type="number" id="inflation" value="2.5" step="0.1" oninput="calculate()"></div>
                <div class="tax-box"><div class="input-group" style="margin-bottom:0"><label style="color:var(--accent-color)">🇰🇷 대한민국 세제 혜택 선택</label><select id="taxType" onchange="calculate()"><option value="general">일반 과세 (15.4%)</option><option value="isa">ISA/비과세 (0% 가정)</option><option value="pension">연금저축/IRP (과세이연)</option></select></div></div>
                <button class="btn-calc" onclick="calculate()">결과 시뮬레이션</button>
                <div class="tax-info">* 일반 과세는 이자 소득세 15.4%를 매년 차감합니다.</div>
            </aside>
            <main class="card">
                <div class="result-header">
                    <div class="res-box"><div class="res-label">최종 세후 명목 자산</div><div class="res-value val-nominal" id="totalValue">₩ 0</div></div>
                    <div class="res-box" style="border-color: var(--real-value-color)"><div class="res-label">물가 반영 실질 구매력</div><div class="res-value val-real" id="realValue">₩ 0</div></div>
                </div>
                <div class="chart-container"><canvas id="assetChart"></canvas></div>
                <div class="stats-grid">
                    <div class="stat-small"><span class="label">총 투자 원금</span><span class="value" id="statPrincipal">₩ 0</span></div>
                    <div class="stat-small"><span class="label">납부 예상 세금</span><span class="value" style="color: #ef4444" id="statTax">₩ 0</span></div>
                    <div class="stat-small"><span class="label">실질 수익금</span><span class="value" id="statProfit">₩ 0</span></div>
                    <div class="stat-small"><span class="label">실질 수익률</span><span class="value" id="statReturn">0%</span></div>
                </div>
                <div id="comparisonBanner"><div class="banner-title" id="bannerTitle"></div><div class="banner-desc" id="bannerDesc"></div></div>
            </main>
        </div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const els = { principal: $('principal'), monthly: $('monthly'), rate: $('rate'), years: $('years'), inflation: $('inflation'), taxType: $('taxType'), totalValue: $('totalValue'), realValue: $('realValue'), statPrincipal: $('statPrincipal'), statTax: $('statTax'), statProfit: $('statProfit'), statReturn: $('statReturn'), modal: $('customAlert'), modalTitle: $('modalTitle'), modalMsg: $('modalMsg'), banner: $('comparisonBanner'), bannerTitle: $('bannerTitle'), bannerDesc: $('bannerDesc') };
        
        let myChart = null, prankCounter = 0, unlocked = false, isModalActive = false;
        const prankMessages = ["더이상은 안되지롱 😜", "훗 넌 더이상 나아갈수 없어 🛡️", "또 누르시게요? 에베베~ 😝", "지구 정복이 꿈이신가요? 🌍", "숫자가 너무 커서 서버가 울고 있어요.. 😭", "적당히 하세요, 현기증 난단 말이에요! 😵", "와우, 이 돈이면 화성도 사겠어요! 🚀", "멈춰! (정색) ✋", "당신의 열정에 박수를 보냅니다. 👏"];

        function toggleMode() { document.body.classList.toggle('dark-mode'); $('modeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode'; calculate(); }
        
        function showAlert(msg, title = "⚠️ 시스템 알림") {
            if (isModalActive) return;
            isModalActive = true; document.activeElement.blur();
            els.modalTitle.innerText = title; els.modalMsg.innerText = msg;
            els.modal.style.display = 'flex'; setTimeout(() => els.modal.classList.add('active'), 10);
            if (!unlocked && ++prankCounter === 10) {
                setTimeout(() => { isModalActive = false; unlocked = true; showAlert("끈질기시네요! 제가 졌습니다. 🏳️ '자' 단위까지 허용해드릴게요.", "🏳️ 항복 선언"); }, 500);
            }
        }
        function closeAlert() { els.modal.classList.remove('active'); setTimeout(() => { els.modal.style.display = 'none'; isModalActive = false; }, 200); }

        const fmtDots = n => Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const getVal = el => parseFloat(el.value.replace(/\./g, "")) || 0;

        function handleInput(el) {
            if (isModalActive) return;
            let val = el.value.replace(/[^0-9]/g, "");
            const limit = unlocked ? 28 : 24;
            if (val.length > limit) {
                showAlert(unlocked ? "이제 그만... 제발요! 😭" : prankMessages[Math.floor(Math.random() * prankMessages.length)]);
                val = val.substring(0, limit);
            }
            el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            calculate();
        }

        function formatCurrency(num) {
            if (num < 10000) return '₩ ' + fmtDots(num);
            const units = ['', '만', '억', '조', '경', '해', '자', '양'];
            let parts = [], temp = num, idx = 0;
            while (temp > 0.9 && idx < units.length) {
                let rem = Math.floor(temp % 10000);
                if (rem > 0) parts.push(fmtDots(rem) + units[idx]);
                temp /= 10000; idx++;
            }
            return parts.reverse().slice(0, 2).join(' ') + ' 원';
        }

        function calculate() {
            const P = getVal(els.principal), PMT = getVal(els.monthly), limit = unlocked ? 1e28 : 1e24;
            if (P >= limit || PMT >= limit) return showAlert("이런 장난꾸러기! 한계를 넘볼 수 없습니다.");
            
            let cur = P, totalP = P, totalT = 0;
            const years = parseInt(els.years.value) || 0, mRate = (getVal(els.rate) / 100) / 12, tRate = els.taxType.value === 'general' ? 0.154 : 0, labels = ['현재'], dNom = [P], dReal = [P], dPriz = [P];

            for (let y = 1; y <= years; y++) {
                for (let m = 1; m <= 12; m++) {
                    let intr = cur * mRate, tax = intr * tRate;
                    totalT += tax; cur += (intr - tax + PMT); totalP += PMT;
                    if (cur >= limit) return showAlert("계산 결과가 한계를 초과했습니다! 지구가 위험해요! 🌍");
                }
                dNom.push(cur); dReal.push(cur / Math.pow(1 + getVal(els.inflation)/100, y)); dPriz.push(totalP); labels.push(y + '년');
            }

            els.totalValue.innerText = formatCurrency(cur);
            els.realValue.innerText = formatCurrency(dReal[dReal.length-1]);
            els.statPrincipal.innerText = formatCurrency(totalP);
            els.statTax.innerText = formatCurrency(totalT);
            els.statProfit.innerText = formatCurrency(cur - totalP);
            els.statReturn.innerText = (((cur - totalP) / totalP) * 100).toFixed(1) + '%';
            
            updateChart(labels, dNom, dReal, dPriz);
            if (cur >= 1e20) {
                els.banner.style.display = 'block';
                els.bannerTitle.innerText = cur >= 1e24 ? "🌌 우주를 지배하는 자!" : "🌍 지구급 부의 탄생!";
                els.bannerDesc.innerText = cur >= 1e24 ? `지구를 ${fmtDots(cur / 1e18)}개 살 수 있습니다. 전 우주에 치킨을 쏠 수 있어요!` : `전 세계 사람들에게 아파트를 한 채씩 선물하고도 남습니다.`;
            } else els.banner.style.display = 'none';
        }

        function updateChart(labels, nominal, real, principal) {
            const ctx = $('assetChart').getContext('2d'), isDark = document.body.classList.contains('dark-mode'), tCol = isDark ? '#94a3b8' : '#4b5563', gCol = isDark ? '#334155' : '#e5e7eb';
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: '명목 자산', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 }, { label: '실질 가치', data: real, borderColor: '#db2777', borderDash: [5, 5], tension: 0.3 }, { label: '투자 원금', data: principal, borderColor: isDark ? '#64748b' : '#9ca3af', borderWidth: 2, tension: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: tCol, font: { family: 'Pretendard' } } }, tooltip: { callbacks: { label: c => (c.dataset.label + ': ' + formatCurrency(c.parsed.y)) } } }, scales: { x: { grid: { color: gCol }, ticks: { color: tCol } }, y: { grid: { color: gCol }, ticks: { color: tCol, callback: v => v >= 1e12 ? (v / 1e12).toFixed(1) + '조' : v >= 1e8 ? (v / 1e8).toFixed(1) + '억' : v } } }, interaction: { intersect: false, mode: 'index' } }
            });
        }
        calculate();
    </script>
</body>
</html>
