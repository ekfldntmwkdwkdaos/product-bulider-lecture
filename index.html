<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편한 복리 계산기 - 금융의 마법</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');
        :root {
            --bg-color: #f3f4f6; --header-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --real-value-color: #db2777;
            --border-color: #e5e7eb; --input-bg: #ffffff; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode {
            --bg-color: #0f172a; --header-bg: #1e293b; --card-bg: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-color: #38bdf8; --real-value-color: #f472b6;
            --border-color: #334155; --input-bg: #0f172a; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        /* 단위별 테마 스타일 */
        body.theme-eok { background: linear-gradient(135deg, var(--bg-color) 0%, #e0f2fe 100%); }
        body.theme-jo { background: linear-gradient(135deg, #1e293b 0%, #4338ca 100%); color: #fff; }
        body.theme-jo .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        body.theme-jo .res-label, body.theme-jo label { color: #cbd5e1; }
        body.theme-jo input { color: #fff !important; background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.2); }
        
        body.theme-ja { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); color: #fff; overflow-x: hidden; }
        body.theme-ja .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        body.theme-ja .res-label, body.theme-ja label { color: #94a3b8; }
        body.theme-ja input { color: #fff !important; background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); }
        body.theme-ja::after { content: '✨'; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.5; animation: spaceStars 10s infinite linear; font-size: 20px; }
        
        @keyframes spaceStars { from { transform: translateY(0); } to { transform: translateY(-100px); } }

        body { font-family: 'Pretendard', sans-serif; margin: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); line-height: 1.6; min-height: 100vh; color: var(--text-primary); }
        header { background-color: var(--header-bg); padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; z-index: 10; }
        header h1 { font-family: 'Noto Serif KR', serif; margin: 0; font-size: 2.2em; color: var(--accent-color); }
        .mode-toggle { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; cursor: pointer; color: var(--text-primary); font-size: 0.85em; }
        .container { width: 95%; max-width: 1100px; margin: 20px auto 60px; padding: 0 20px; position: relative; z-index: 5; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: all 0.3s; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85em; color: var(--text-secondary); }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 1em; outline: none; transition: all 0.2s; }
        
        .coffee-btn { width: 100%; background: #713f12; color: #fef3c7; border: none; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-calc { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 1.1em; font-weight: 800; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        
        .res-box { padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .res-value { font-size: 1.8em; font-weight: 800; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; border-radius: 20px; overflow: hidden; background: rgba(255,255,255,0.05); }
        
        .currency-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .curr-item { padding: 10px; background: rgba(0,0,0,0.05); border-radius: 12px; text-align: center; font-size: 0.8em; }
        
        /* 모달 스타일 수정 - 글자색 고정 */
        #customAlert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            max-width: 450px; 
            width: 85%; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            transform: scale(0.8); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            opacity: 0; 
            color: var(--text-primary) !important; /* 글자색 강제 지정 */
        }
        #customAlert.active .modal-content { transform: scale(1); opacity: 1; }
        .modal-msg { color: var(--text-primary) !important; font-size: 1.1em; line-height: 1.6; margin-bottom: 25px; }
        .modal-title { font-size: 1.5em; font-weight: 800; color: #ef4444 !important; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="customAlert">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">⚠️ 알림</div>
            <div class="modal-msg" id="modalMsg"></div>
            <button class="btn-modal" onclick="closeAlert()" style="background:var(--accent-color); color:#fff; border:none; padding:12px 40px; border-radius:12px; font-weight:700; cursor:pointer; transition:0.2s;">알겠어요!</button>
        </div>
    </div>
    
    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1>간편한 복리 계산기</h1>
        <p>복리의 마법으로 당신의 미래를 시뮬레이션하세요</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <aside class="card">
                <button class="coffee-btn" onclick="setCoffeeMiracle()">☕ 커피 한 잔의 기적</button>
                <div class="input-group"><label>초기 투자액 (원)</label><input type="text" id="principal" value="10.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>월 추가 적립액 (원)</label><input type="text" id="monthly" value="1.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>연 예상 수익률 (%)</label><input type="number" id="rate" value="8" step="0.1" oninput="calculate()"></div>
                <div class="input-group"><label>투자 기간 (년)</label><input type="number" id="years" value="10" oninput="calculate()"></div>
                <div class="input-group"><label>연 물가상승률 (%)</label><input type="number" id="inflation" value="2.5" step="0.1" oninput="calculate()"></div>
                <div class="input-group"><label>세제 혜택</label><select id="taxType" onchange="calculate()"><option value="general">일반 과세 (15.4%)</option><option value="isa">ISA/비과세 (0%)</option><option value="pension">연금저축 (과세이연)</option></select></div>
                <button class="btn-calc" onclick="playCalc()">계산하기 💰</button>
            </aside>
            <main class="card">
                <div class="result-header">
                    <div class="res-box">
                        <div class="res-label">최종 세후 명목 자산</div>
                        <div class="res-value val-nominal" id="totalValue">₩ 0</div>
                        <div id="rankBadge" class="rank-badge" style="display:inline-block; padding:4px 12px; background:#fbbf24; color:#78350f; border-radius:20px; font-size:0.75em; font-weight:800; margin-top:8px;">랭킹 계산 중...</div>
                    </div>
                    <div class="res-box" style="border-color: var(--real-value-color)">
                        <div class="res-label">실질 구매력 (현재 가치)</div>
                        <div class="res-value val-real" id="realValue">₩ 0</div>
                        <div class="currency-grid">
                            <div class="curr-item"><span class="curr-label" style="display:block; opacity:0.7; font-size:0.8em;">USD</span><span id="valUSD" style="font-weight:700;">$0</span></div>
                            <div class="curr-item"><span class="curr-label" style="display:block; opacity:0.7; font-size:0.8em;">JPY</span><span id="valJPY" style="font-weight:700;">¥0</span></div>
                            <div class="curr-item"><span class="curr-label" style="display:block; opacity:0.7; font-size:0.8em;">BTC</span><span id="valBTC" style="font-weight:700;">0₿</span></div>
                        </div>
                    </div>
                </div>
                <div class="chart-container"><canvas id="assetChart"></canvas></div>
                <div id="quoteBox" style="margin-top:24px; padding:15px; border-left:4px solid var(--accent-color); background:rgba(37,99,235,0.05); font-style:italic; font-size:0.9em; border-radius:0 12px 12px 0;">"복리는 세계 8대 불가사의다." - 아인슈타인</div>
                <div id="comparisonBanner" style="display:none; margin-top:20px; padding:20px; background:rgba(255,255,255,0.1); border-radius:16px; text-align:center; border:1px dashed rgba(255,255,255,0.5);">
                    <div id="bannerTitle" style="font-weight:800; margin-bottom:5px;"></div>
                    <div id="bannerDesc" style="font-size:0.9em; opacity:0.9;"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const els = { principal: $('principal'), monthly: $('monthly'), rate: $('rate'), years: $('years'), inflation: $('inflation'), taxType: $('taxType'), totalValue: $('totalValue'), realValue: $('realValue'), modal: $('customAlert'), modalTitle: $('modalTitle'), modalMsg: $('modalMsg'), banner: $('comparisonBanner'), quote: $('quoteBox'), rank: $('rankBadge'), valUSD: $('valUSD'), valJPY: $('valJPY'), valBTC: $('valBTC') };
        
        let myChart = null, prankCounter = 0, unlocked = false, isModalActive = false;
        const prankMessages = ["더이상은 안되지롱 😜", "훗 넌 더이상 나아갈수 없어 🛡️", "또 누르시게요? 에베베~ 😝", "숫자가 너무 커서 서버가 울고 있어요.. 😭", "와우, 이 돈이면 화성도 사겠어요! 🚀", "멈춰! (정색) ✋"];
        const quotes = ["인내심은 부를 일구는 가장 강력한 도구다.", "복리는 세계 8대 불가사의다. - 아인슈타인", "투자의 제1원칙은 돈을 잃지 않는 것이다. - 워런 버핏", "오늘 심은 나무가 내일 그늘을 만들어준다.", "가장 좋은 투자 시기는 바로 '지금'이다.", "시간이 흐를수록 복리의 힘은 무서워진다."];

        function playCalc() { playCoinSound(); calculate(); }
        function playCoinSound() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); } catch(e) {} }

        function setCoffeeMiracle() { els.principal.value = "0"; els.monthly.value = "150.000"; els.rate.value = "10"; els.years.value = "30"; calculate(); showAlert("매일 커피 한 잔(5,000원)을 아껴 연 10% 수익률로 30년 투자하면 어떤 일이 벌어질까요? 결과 창을 확인해 보세요!", "☕ 커피의 기적 설정 완료"); }
        function toggleMode() { document.body.classList.toggle('dark-mode'); $('modeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode'; calculate(); }
        
        function showAlert(msg, title = "⚠️ 알림") {
            if (isModalActive) return;
            isModalActive = true; document.activeElement.blur();
            els.modalTitle.innerText = title; els.modalMsg.innerText = msg;
            els.modal.style.display = 'flex'; setTimeout(() => els.modal.classList.add('active'), 10);
            if (!unlocked && ++prankCounter === 10) { setTimeout(() => { isModalActive = false; unlocked = true; showAlert("끈질기시네요! 제가 졌습니다. 🏳️ '자' 단위까지 허용해드릴게요.", "🏳️ 항복 선언"); }, 500); }
        }
        function closeAlert() { els.modal.classList.remove('active'); setTimeout(() => { els.modal.style.display = 'none'; isModalActive = false; }, 200); }

        const fmtDots = n => Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const getVal = el => parseFloat(el.value.replace(/\./g, "")) || 0;

        function handleInput(el) {
            if (isModalActive) return;
            let val = el.value.replace(/[^0-9]/g, "");
            const limit = unlocked ? 28 : 24;
            if (val.length > limit) { showAlert(unlocked ? "이제 그만... 제발요! 😭" : prankMessages[Math.floor(Math.random() * prankMessages.length)]); val = val.substring(0, limit); }
            el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            calculate();
        }

        function formatCurrency(num) {
            if (num < 10000) return '₩ ' + fmtDots(num);
            const units = ['', '만', '억', '조', '경', '해', '자', '양'];
            let parts = [], temp = num, idx = 0;
            while (temp > 0.9 && idx < units.length) { let rem = Math.floor(temp % 10000); if (rem > 0) parts.push(fmtDots(rem) + units[idx]); temp /= 10000; idx++; }
            return parts.reverse().slice(0, 2).join(' ') + ' 원';
        }

        function updateTierTheme(val) {
            document.body.classList.remove('theme-eok', 'theme-jo', 'theme-ja');
            if (val >= 1e24) document.body.classList.add('theme-ja');
            else if (val >= 1e12) document.body.classList.add('theme-jo');
            else if (val >= 1e8) document.body.classList.add('theme-eok');
        }

        function calculate() {
            const P = getVal(els.principal), PMT = getVal(els.monthly), limit = unlocked ? 1e28 : 1e24;
            if (P >= limit || PMT >= limit) return showAlert("한계를 넘볼 수 없습니다!");
            let cur = P, totalP = P, totalT = 0;
            const years = parseInt(els.years.value) || 0, mRate = (getVal(els.rate) / 100) / 12, tRate = els.taxType.value === 'general' ? 0.154 : 0, labels = ['현재'], dNom = [P], dReal = [P], dPriz = [P];
            for (let y = 1; y <= years; y++) { for (let m = 1; m <= 12; m++) { let intr = cur * mRate, tax = intr * tRate; totalT += tax; cur += (intr - tax + PMT); totalP += PMT; if (cur >= limit) return showAlert("지구가 위험해요! 🌍"); } dNom.push(cur); dReal.push(cur / Math.pow(1 + getVal(els.inflation)/100, y)); dPriz.push(totalP); labels.push(y + '년'); }
            els.totalValue.innerText = formatCurrency(cur);
            els.realValue.innerText = formatCurrency(dReal[dReal.length-1]);
            els.valUSD.innerText = '$' + fmtDots(cur / 1350);
            els.valJPY.innerText = '¥' + fmtDots(cur / 9);
            els.valBTC.innerText = (cur / 95000000).toFixed(4) + '₿';
            if (cur >= 300e12) els.rank.innerText = "일론 머스크를 능가하는 우주 1위! 🚀";
            else if (cur >= 150e12) els.rank.innerText = "워런 버핏과 어깨를 나란히! 🐢";
            else if (cur >= 13e8) els.rank.innerText = "세계 상위 1% 부자 진입! 💎";
            else els.rank.innerText = "대한민국 평균 이상의 저력! 👍";
            els.quote.innerText = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"';
            updateTierTheme(cur);
            updateChart(labels, dNom, dReal, dPriz);
            if (cur >= 1e20) { els.banner.style.display = 'block'; $('bannerTitle').innerText = cur >= 1e24 ? "🌌 우주를 지배하는 자!" : "🌍 지구급 부의 탄생!"; $('bannerDesc').innerText = cur >= 1e24 ? `지구를 약 ${fmtDots(cur / 1e18)}개 살 수 있습니다.` : `전 세계 사람들에게 아파트를 한 채씩 선물할 수 있습니다.`; } else els.banner.style.display = 'none';
        }

        function updateChart(labels, nominal, real, principal) {
            const ctx = $('assetChart').getContext('2d'), isDark = document.body.classList.contains('dark-mode'), tCol = isDark ? '#94a3b8' : '#4b5563', gCol = isDark ? '#334155' : '#e5e7eb';
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: '명목 자산', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 }, { label: '실질 가치', data: real, borderColor: '#db2777', borderDash: [5, 5], tension: 0.3 }, { label: '투자 원금', data: principal, borderColor: isDark ? '#64748b' : '#9ca3af', borderWidth: 2, tension: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: tCol } } }, scales: { x: { grid: { color: gCol }, ticks: { color: tCol } }, y: { grid: { color: gCol }, ticks: { color: tCol, callback: v => v >= 1e12 ? (v / 1e12).toFixed(1) + '조' : v >= 1e8 ? (v / 1e8).toFixed(1) + '억' : v } } } } });
        }
        calculate();
    </script>
</body>
</html>
