<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편한 복리 계산기 - 금융의 마법</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');
        :root {
            --bg-color: #f3f4f6; --header-bg: #ffffff; --card-bg: #ffffff;
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --real-value-color: #db2777;
            --border-color: #e5e7eb; --input-bg: #ffffff; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode {
            --bg-color: #0f172a; --header-bg: #1e293b; --card-bg: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-color: #38bdf8; --real-value-color: #f472b6;
            --border-color: #334155; --input-bg: #0f172a; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body.theme-jo .input-group label, body.theme-ja .input-group label { color: #f8fafc !important; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        body.theme-jo .input-group input, body.theme-ja .input-group input { color: #fff !important; background: rgba(255,255,255,0.1) !important; border-color: rgba(255,255,255,0.3) !important; }
        body.theme-eok { background: linear-gradient(135deg, var(--bg-color) 0%, #e0f2fe 100%); }
        body.theme-jo { background: linear-gradient(135deg, #1e293b 0%, #4338ca 100%); color: #fff; }
        body.theme-jo .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        body.theme-ja { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); color: #fff; overflow-x: hidden; }
        body.theme-ja .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        body.theme-ja::after { content: '✨'; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.5; animation: spaceStars 10s infinite linear; font-size: 20px; }
        @keyframes spaceStars { from { transform: translateY(0); } to { transform: translateY(-100px); } }

        body { font-family: 'Pretendard', sans-serif; margin: 0; transition: all 0.5s; line-height: 1.6; min-height: 100vh; color: var(--text-primary); }
        
        header { 
            background-color: var(--header-bg); 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color); 
            position: relative !important;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        header h1 { font-family: 'Noto Serif KR', serif; margin: 0; font-size: 3.2em; color: var(--accent-color); display: flex; align-items: center; justify-content: center; gap: 15px; font-weight: 900; }
        .usd-ticker { display: inline-block; font-size: 1em; background: rgba(37, 99, 235, 0.1); padding: 8px 20px; border-radius: 20px; color: var(--accent-color); font-weight: 700; margin-top: 20px; }
        
        .mode-toggle { 
            position: absolute;
            top: 20px;
            right: 30px;
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 1em; 
            font-weight: 800; 
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); 
            transition: 0.3s; 
        }
        .mode-toggle:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
        
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr !important; } .container { margin-top: 20px; } }
        @media (max-width: 650px) {
            header { padding: 40px 15px; } 
            header h1 { font-size: 2em; flex-direction: column; gap: 10px; }
            .mode-toggle { position: relative; top: 0; right: 0; margin-bottom: 20px; width: 100%; }
            .res-value { font-size: 1.6em !important; }
            .card { padding: 20px; }
            .chart-container { height: 300px; }
        }

        .container { width: 95%; max-width: 1200px; margin: 40px auto 80px; padding: 0 20px; box-sizing: border-box; }
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; align-items: start; }
        .card { background-color: var(--card-bg); padding: 30px; border-radius: 32px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: all 0.3s; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9em; color: var(--text-secondary); }
        .input-group input, .input-group select { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 1.1em; outline: none; transition: 0.2s; box-sizing: border-box; }
        
        .coffee-btn { width: 100%; background: linear-gradient(135deg, #713f12 0%, #451a03 100%); color: #fef3c7; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1em; }
        .btn-calc { width: 100%; background: var(--accent-color); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.2em; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        
        .res-box { padding: 25px; border-radius: 24px; background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 20px; }
        .res-value { font-size: 2em; font-weight: 900; word-break: break-all; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 25px; border-radius: 24px; overflow: hidden; }
        
        #comparisonBanner { display: none; margin-top: 24px; padding: 30px; border-radius: 24px; text-align: center; animation: slideUp 0.5s ease-out; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .ad-area { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.02); border: 1px dashed var(--border-color); border-radius: 20px; text-align: center; color: var(--text-secondary); font-size: 0.8em; }
        .ad-placeholder { width: 100%; max-width: 728px; height: 90px; margin: 10px auto 0; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--border-color); }

        .money-particle { position: fixed; top: -50px; font-size: 24px; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #customAlert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); padding: 45px; border-radius: 40px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5); max-width: 480px; width: 85%; text-align: center; border: 1px solid var(--border-color); transform: scale(0.8); transition: 0.3s; opacity: 0; color: var(--text-primary) !important; }
        #customAlert.active .modal-content { transform: scale(1); opacity: 1; }
    </style>
</head>
<body>
    <div id="customAlert"><div class="modal-content"><div class="modal-title" id="modalTitle" style="font-size:1.6em; font-weight:900; color:#ef4444; margin-bottom:15px;">⚠️ 알림</div><div class="modal-msg" id="modalMsg" style="margin-bottom:30px; font-size:1.1em;"></div><button class="btn-modal" onclick="closeAlert()" style="background:var(--accent-color); color:#fff; border:none; padding:14px 50px; border-radius:16px; font-weight:800; cursor:pointer;">확인</button></div></div>
    
    <header id="mainHeader">
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 다크 모드</button>
        <h1><span id="headerIcon">🌱</span> 간편한 복리 계산기</h1>
        <div class="usd-ticker">현재 환율: 1 USD = <span id="headerUSD">...</span> KRW</div>
    </header>

    <div class="container">
        <div class="main-grid">
            <aside class="card">
                <button class="coffee-btn" onclick="setCoffeeMiracle()">☕ 커피 한 잔의 기적</button>
                <div class="input-group"><label>초기 투자액 (원)</label><input type="text" id="principal" placeholder="입력하세요" oninput="handleInput(this)"></div>
                <div class="input-group"><label>월 추가 적립액 (원)</label><input type="text" id="monthly" placeholder="입력하세요" oninput="handleInput(this)"></div>
                <div class="input-group"><label>연 예상 수익률 (%)</label><input type="number" id="rate" value="8" step="0.1"></div>
                <div class="input-group"><label>투자 기간 (년)</label><input type="number" id="years" value="10"></div>
                <div class="input-group"><label>연 물가상승률 (%)</label><input type="number" id="inflation" value="2.5" step="0.1"></div>
                <div class="input-group"><label>세제 혜택 선택</label><select id="taxType"><option value="general">일반 과세 (15.4%)</option><option value="isa">ISA/비과세 (0%)</option><option value="pension">연금저축 (과세이연)</option></select></div>
                <button class="btn-calc" onclick="playCalc()">복리의 마법 시작 💰</button>
            </aside>
            <main class="card">
                <div class="result-header">
                    <div class="res-box">
                        <div class="res-label" style="font-size:0.9em; opacity:0.8; font-weight:600; margin-bottom:5px;">최종 세후 명목 자산</div>
                        <div class="res-value val-nominal" id="totalValue">₩ 0</div>
                        <div id="rankBadge" style="display:none; padding:6px 14px; background:#fbbf24; color:#78350f; border-radius:20px; font-size:0.8em; font-weight:900; margin-top:12px;"></div>
                    </div>
                    <div class="res-box" style="border-color: var(--real-value-color)">
                        <div class="res-label" style="font-size:0.9em; opacity:0.8; font-weight:600; margin-bottom:5px;">물가 반영 실질 구매력</div>
                        <div class="res-value val-real" id="realValue">₩ 0</div>
                        <div style="font-size:1em; font-weight:800; margin-top:12px; color:var(--accent-color);">달러(USD) 환산: <span id="valUSD">$0</span></div>
                    </div>
                </div>
                <div id="comparisonBanner"><div class="banner-title" id="bannerTitle" style="font-size:1.4em; font-weight:900; margin-bottom:10px;"></div><div class="banner-desc" id="bannerDesc" style="font-size:1.1em; font-weight:600;"></div></div>
                <div class="chart-container"><canvas id="assetChart"></canvas></div>
                <div id="quoteBox" style="margin-top:20px; padding:15px 20px; border-left:6px solid var(--accent-color); background:rgba(37,99,235,0.05); font-style:italic; font-size:1.05em; border-radius:0 20px 20px 0; line-height:1.5; min-height:50px;"></div>
                <div class="ad-area"><span>Sponsored Content</span><div class="ad-placeholder" id="adPlaceholder">여기에 광고가 표시됩니다</div></div>
            </main>
        </div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const els = { principal: $('principal'), monthly: $('monthly'), rate: $('rate'), years: $('years'), inflation: $('inflation'), taxType: $('taxType'), totalValue: $('totalValue'), realValue: $('realValue'), modal: $('customAlert'), modalTitle: $('modalTitle'), modalMsg: $('modalMsg'), banner: $('comparisonBanner'), quote: $('quoteBox'), rank: $('rankBadge'), valUSD: $('valUSD'), hIcon: $('headerIcon'), headerUSD: $('headerUSD') };
        
        let myChart = null, prankCounter = 0, unlocked = false, isModalActive = false, lastTier = '';
        let currentRate = 1350; 

        const prankMessages = ["더이상은 안되지롱 😜", "🛡️ 여기까지다!", "에베베~ 😝", "😭 서버가 울어요", "🚀 화성 가자!", "✋ 멈춰!"];
        const quotes = ["인내심은 부를 일구는 가장 강력한 도구다.", "복리는 세계 8대 불가사의다.", "투자의 제1원칙은 돈을 잃지 않는 것이다.", "오늘 심은 나무가 내일 그늘을 만들어준다.", "가장 좋은 투자 시기는 바로 '지금'이다.", "시간이 흐를수록 복리의 힘은 무서워진다."];

        async function updateExchangeRate() {
            const now = new Date().getTime();
            const cachedData = localStorage.getItem('exchangeRateData');
            if (cachedData) {
                const { rate, timestamp } = JSON.parse(cachedData);
                if (now - timestamp < 43200000) { applyRate(rate); return; }
            }
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if (data && data.rates && data.rates.KRW) {
                    const newRate = Math.floor(data.rates.KRW);
                    localStorage.setItem('exchangeRateData', JSON.stringify({ rate: newRate, timestamp: now }));
                    applyRate(newRate);
                } else throw new Error();
            } catch (e) { applyRate(1350); }
        }

        function applyRate(rate) { currentRate = rate; els.headerUSD.innerText = fmtDots(rate); }
        function playCalc() { playCoinSound(); calculate(); }
        function playCoinSound() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); } catch(e) {} }
        function setCoffeeMiracle() { els.principal.value = "0"; els.monthly.value = "150.000"; els.rate.value = "10"; els.years.value = "30"; playCalc(); showAlert("매일 커피 한 잔을 아껴 30년 투자하면 어떤 일이 벌어질까요?", "☕ 커피의 기적"); }
        function toggleMode() { document.body.classList.toggle('dark-mode'); $('modeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️ 라이트 모드' : '🌙 다크 모드'; }
        function showAlert(msg, title = "⚠️ 알림") { if (isModalActive) return; isModalActive = true; document.activeElement.blur(); els.modalTitle.innerText = title; els.modalMsg.innerText = msg; els.modal.style.display = 'flex'; setTimeout(() => els.modal.classList.add('active'), 10); if (!unlocked && ++prankCounter === 10) { setTimeout(() => { isModalActive = false; unlocked = true; showAlert("끈질기시네요! 제가 졌습니다. 🏳️ '자' 단위까지 허용해드릴게요.", "🏳️ 항복 선언"); }, 500); } }
        function closeAlert() { els.modal.classList.remove('active'); setTimeout(() => { els.modal.style.display = 'none'; isModalActive = false; }, 200); }
        const fmtDots = n => Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const getVal = el => parseFloat(el.value.replace(/\./g, "")) || 0;
        function handleInput(el) { if (isModalActive) return; let val = el.value.replace(/[^0-9]/g, ""); const limit = unlocked ? 28 : 24; if (val.length > limit) { showAlert(unlocked ? "이제 그만... 제발요! 😭" : prankMessages[Math.floor(Math.random() * prankMessages.length)]); val = val.substring(0, limit); } el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function formatCurrency(num) { if (num < 10000) return '₩ ' + fmtDots(num); const units = ['', '만', '억', '조', '경', '해', '자', '양']; let parts = [], temp = num, idx = 0; while (temp > 0.9 && idx < units.length) { let rem = Math.floor(temp % 10000); if (rem > 0) parts.push(fmtDots(rem) + units[idx]); temp /= 10000; idx++; } return parts.reverse().slice(0, 2).join(' ') + ' 원'; }
        
        function triggerMoneyShower() {
            const emojis = ['💰', '💵', '⭐', '💎', '🪙'];
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const el = document.createElement('div'); el.className = 'money-particle'; el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw'; el.style.animationDuration = (Math.random() * 2 + 1) + 's'; el.style.opacity = Math.random();
                    document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
                }, i * 50);
            }
        }

        function updateTierTheme(val) {
            let currentTier = '', icon = '🌱';
            if (val >= 1e24) { currentTier = 'theme-ja'; icon = '🪐'; }
            else if (val >= 1e12) { currentTier = 'theme-jo'; icon = '🌍'; }
            else if (val >= 1e8) { currentTier = 'theme-eok'; icon = '🏢'; }
            else if (val >= 1e6) icon = '🐷';
            else icon = '🌱';
            els.hIcon.innerText = icon;
            if (currentTier !== lastTier) {
                if ((currentTier === 'theme-jo' || currentTier === 'theme-ja') && lastTier !== '') triggerMoneyShower();
                document.body.classList.remove('theme-eok', 'theme-jo', 'theme-ja');
                if (currentTier) document.body.classList.add(currentTier);
                lastTier = currentTier;
            }
        }

        function updateComparison(val) {
            els.banner.style.display = 'block'; let t = '', d = '', bg = '', c = '#78350f';
            if (val < 100000) { t = "🌱 시작은 미미하지만.."; d = "티끌 모아 태산! 당신을 응원합니다."; bg = "linear-gradient(135deg, #dcfce7 0%, #86efac 100%)"; }
            else if (val < 1000000) { t = "💪 차곡차곡 쌓이는 중!"; d = "습관이 부자를 만듭니다. 계속 전진하세요!"; bg = "linear-gradient(135deg, #fef9c3 0%, #fde047 100%)"; }
            else if (val >= 1e24) { t = "🌌 우주 정거장 집주인"; d = `지구를 ${fmtDots(val / 1e18)}개 사고 달에 신도시를 건설할 상상 초월 자산!`; bg = "linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%)"; c = "#fff"; }
            else if (val >= 1e20) { t = "🌍 지구의 실질적 주인"; d = "전 세계 GDP를 합친 것보다 많습니다. 당신이 곧 법입니다."; bg = "linear-gradient(135deg, #064e3b 0%, #10b981 100%)"; c = "#fff"; }
            else if (val >= 1e12) { t = "👑 재벌 3세 저리가라"; d = "대기업 몇 개쯤은 쇼핑하듯 살 수 있는 엄청난 금액입니다."; bg = "linear-gradient(135deg, #4c1d95 0%, #8b5cf6 100%)"; c = "#fff"; }
            else if (val >= 1e9) { t = "🏢 강남 건물주 등극!"; d = "축하합니다! 이제 강남 요지에 빌딩 한 채 정도는 가볍게 소유하시겠네요."; bg = "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)"; }
            else { els.banner.style.display = 'none'; return; }
            $('bannerTitle').innerText = t; $('bannerDesc').innerText = d; els.banner.style.background = bg; els.banner.style.color = c;
        }

        function calculate() {
            const P = getVal(els.principal), PMT = getVal(els.monthly), limit = unlocked ? 1e28 : 1e24;
            if (P >= limit || PMT >= limit) return showAlert("한계를 넘볼 수 없습니다!");
            let cur = P, totalP = P, totalT = 0; const years = parseInt(els.years.value) || 0, mRate = (getVal(els.rate) / 100) / 12, tRate = els.taxType.value === 'general' ? 0.154 : 0, labels = ['현재'], dNom = [P], dReal = [P], dPriz = [P];
            for (let y = 1; y <= years; y++) { for (let m = 1; m <= 12; m++) { let intr = cur * mRate, tax = intr * tRate; totalT += tax; cur += (intr - tax + PMT); totalP += PMT; if (cur >= limit) return showAlert("지구가 위험해요! 🌍"); } dNom.push(cur); dReal.push(cur / Math.pow(1 + getVal(els.inflation)/100, y)); dPriz.push(totalP); labels.push(y + '년'); }
            els.totalValue.innerText = formatCurrency(cur); els.realValue.innerText = formatCurrency(dReal[dReal.length-1]);
            els.valUSD.innerText = '$' + fmtDots(cur / currentRate);
            if (cur >= 1000000) { els.rank.style.display = 'inline-block'; if (cur >= 300e12) els.rank.innerText = "일론 머스크 능가! 🚀"; else if (cur >= 150e12) els.rank.innerText = "워런 버핏급! 🐢"; else if (cur >= 13e8) els.rank.innerText = "상위 1% 부자! 💎"; else els.rank.innerText = "대한민국 저력! 👍"; } else { els.rank.style.display = 'none'; }
            els.quote.innerText = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"'; updateTierTheme(cur); updateComparison(cur); updateChart(labels, dNom, dReal, dPriz);
        }

        function updateChart(labels, nominal, real, principal) {
            const useLightText = document.body.classList.contains('dark-mode') || document.body.classList.contains('theme-jo') || document.body.classList.contains('theme-ja');
            const tCol = useLightText ? '#cbd5e1' : '#4b5563', gCol = useLightText ? 'rgba(255,255,255,0.1)' : '#e5e7eb';
            const ctx = $('assetChart').getContext('2d'); if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: '명목 자산', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 }, { label: '실질 가치', data: real, borderColor: '#db2777', borderDash: [5, 5], tension: 0.3 }, { label: '투자 원금', data: principal, borderColor: useLightText ? '#94a3b8' : '#9ca3af', borderWidth: 2, tension: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: tCol, font: { weight: 'bold' } } }, tooltip: { callbacks: { label: c => (c.dataset.label + ': ' + formatCurrency(c.parsed.y)) } } }, scales: { x: { grid: { color: gCol }, ticks: { color: tCol } }, y: { grid: { color: gCol }, ticks: { color: tCol, callback: v => v >= 1e12 ? (v / 1e12).toFixed(1) + '조' : v >= 1e8 ? (v / 1e8).toFixed(1) + '억' : v >= 1e4 ? (v / 1e4).toFixed(1) + '만' : v } } }, interaction: { intersect: false, mode: 'index' } } });
        }
        
        // 환율 업데이트
        window.onload = () => {
            updateExchangeRate();
        };
    </script>
</body>
</html>
