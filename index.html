<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneCalc - 복리 효과 계산기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600&display=swap');

        :root {
            --bg-color: #f8f9fa;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #007aff;
            --real-value-color: #e91e63;
            --border-color: #eeeeee;
            --input-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --header-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --real-value-color: #f472b6;
            --border-color: #334155;
            --input-bg: #0f172a;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        header { 
            background-color: var(--header-bg); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 { 
            font-family: 'Noto Serif KR', serif;
            margin: 0; font-size: 2.5em; 
            letter-spacing: -1px;
            color: var(--accent-color);
        }

        header p { color: var(--text-secondary); margin-top: 10px; font-size: 1.1em; }

        .mode-toggle {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid var(--border-color); 
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            color: var(--text-primary); font-size: 0.9em;
        }

        .container { width: 95%; max-width: 1000px; margin: -40px auto 60px; padding: 20px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: var(--text-secondary); }
        .input-group input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); 
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1.1em; box-sizing: border-box;
            outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--accent-color); }

        .btn-calc {
            width: 100%; background-color: var(--accent-color); color: white;
            border: none; padding: 18px; border-radius: 12px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        .btn-calc:hover { transform: translateY(-2px); opacity: 0.9; }

        .result-card { text-align: left; }
        .result-section { margin-bottom: 30px; }
        .result-label { color: var(--text-secondary); font-size: 0.95em; margin-bottom: 5px; }
        .result-value { font-size: 2.4em; font-weight: 800; color: var(--accent-color); margin-bottom: 5px; word-break: break-all; }
        
        .real-value-section { 
            background-color: rgba(233, 30, 99, 0.05); 
            padding: 20px; border-radius: 16px; 
            border: 1px dashed var(--real-value-color);
            margin-bottom: 25px;
        }
        body.dark-mode .real-value-section { background-color: rgba(244, 114, 182, 0.05); }
        .real-label { color: var(--real-value-color); font-weight: 700; font-size: 1em; }
        .real-value { font-size: 2.2em; font-weight: 800; color: var(--real-value-color); }

        .stats { border-top: 1px solid var(--border-color); padding-top: 20px; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95em; }
        .stat-label { color: var(--text-secondary); }
        .stat-value { font-weight: 600; }

        .info-text { font-size: 0.85em; color: var(--text-secondary); margin-top: 20px; line-height: 1.6; }
        .highlight { color: var(--real-value-color); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1>FortuneCalc</h1>
        <p>물가상승까지 고려한 냉철한 미래 자산 설계</p>
    </header>

    <div class="container">
        <div class="grid">
            <!-- 입력 섹션 -->
            <section class="card">
                <div class="input-group">
                    <label>초기 투자 금액 (원)</label>
                    <input type="number" id="principal" value="10000000">
                </div>
                <div class="input-group">
                    <label>매월 추가 적립 (원)</label>
                    <input type="number" id="monthly" value="1000000">
                </div>
                <div class="input-group">
                    <label>연 수익률 (%)</label>
                    <input type="number" id="rate" value="8">
                </div>
                <div class="input-group">
                    <label>투자 기간 (년)</label>
                    <input type="number" id="years" value="10">
                </div>
                <div class="input-group" style="background-color: rgba(0,122,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,122,255,0.1);">
                    <label style="color: var(--accent-color);">📉 예상 물가상승률 (연 %)</label>
                    <input type="number" id="inflation" value="3" step="0.1">
                    <small style="color: var(--text-secondary); font-size: 0.8em;">* 한국 평균 약 2~3%</small>
                </div>
                <button class="btn-calc" onclick="calculate()">시뮬레이션 실행</button>
            </section>

            <!-- 결과 섹션 -->
            <section class="card result-card" id="resultCard">
                <div class="result-section">
                    <div class="result-label">10년 후 최종 예상 자산 (숫자상)</div>
                    <div class="result-value" id="totalValue">₩ 0</div>
                </div>

                <div class="real-value-section">
                    <div class="real-label">⚠️ 물가상승 반영 실질 구매력</div>
                    <div class="real-value" id="realValue">₩ 0</div>
                    <p class="info-text" style="margin-top: 10px; color: var(--text-primary);">
                        현재의 <span id="realValueText" class="highlight">₩ 0</span>과 동일한 가치를 가집니다.
                    </p>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">총 투자 원금</span>
                        <span class="stat-value" id="totalPrincipal">₩ 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">누적 이자 수익</span>
                        <span class="stat-value" id="totalInterest">₩ 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">명목 수익률</span>
                        <span class="stat-value" id="returnRate">0%</span>
                    </div>
                </div>
                
                <p class="info-text">
                    * 복리 효과로 자산은 늘어나지만, <span class="highlight">물가상승</span>으로 인해 미래의 1억은 현재의 1억보다 가치가 낮습니다. 본 계산기는 이를 수학적으로 반영한 결과입니다.
                </p>
            </section>
        </div>
    </div>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.getElementById('modeBtn');
            body.classList.toggle('dark-mode');
            btn.innerHTML = body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(Math.floor(num));
        }

        function calculate() {
            const P = parseFloat(document.getElementById('principal').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
            const years = parseFloat(document.getElementById('years').value) || 0;
            const n = years * 12;
            const inflationRate = (parseFloat(document.getElementById('inflation').value) || 0) / 100;

            if (n <= 0) return;

            // 1. 명목 미래 가치 계산 (Nominal Future Value)
            let futureValue;
            if (r === 0) {
                futureValue = P + (PMT * n);
            } else {
                const compoundFactor = Math.pow(1 + r, n);
                futureValue = P * compoundFactor + PMT * ((compoundFactor - 1) / r);
            }

            // 2. 실질 구매력 계산 (Real Purchasing Power)
            // 현재 가치로 환산: FV / (1 + i)^t
            const realPurchasingPower = futureValue / Math.pow(1 + inflationRate, years);

            const totalPrincipal = P + (PMT * n);
            const totalInterest = futureValue - totalPrincipal;
            const returnRate = ((futureValue - totalPrincipal) / totalPrincipal) * 100;

            // 결과 업데이트
            document.getElementById('totalValue').innerText = formatCurrency(futureValue);
            document.getElementById('realValue').innerText = formatCurrency(realPurchasingPower);
            document.getElementById('realValueText').innerText = formatCurrency(realPurchasingPower);
            
            document.getElementById('totalPrincipal').innerText = formatCurrency(totalPrincipal);
            document.getElementById('totalInterest').innerText = formatCurrency(totalInterest);
            document.getElementById('returnRate').innerText = returnRate.toFixed(1) + '%';
            
            // 애니메이션 효과
            const card = document.getElementById('resultCard');
            card.style.transform = 'scale(1.01)';
            setTimeout(() => card.style.transform = 'scale(1)', 200);
        }

        // 초기 계산 실행
        calculate();
    </script>

</body>
</html>
