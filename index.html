<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간편한 복리 계산기 - 금융의 마법</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');
        :root {
            --bg-color: #f3f4f6; --header-bg: rgba(255, 255, 255, 0.8); --card-bg: #ffffff;
            --text-primary: #111827; --text-secondary: #4b5563;
            --accent-color: #2563eb; --real-value-color: #db2777;
            --border-color: #e5e7eb; --input-bg: #ffffff; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode {
            --bg-color: #0f172a; --header-bg: rgba(30, 41, 59, 0.8); --card-bg: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-color: #38bdf8; --real-value-color: #f472b6;
            --border-color: #334155; --input-bg: #0f172a; --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body.theme-eok { background: linear-gradient(135deg, var(--bg-color) 0%, #e0f2fe 100%); }
        body.theme-jo { background: linear-gradient(135deg, #1e293b 0%, #4338ca 100%); color: #fff; }
        body.theme-jo .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        body.theme-ja { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); color: #fff; overflow-x: hidden; }
        body.theme-ja .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        body.theme-ja::after { content: '✨'; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.5; animation: spaceStars 10s infinite linear; font-size: 20px; }
        @keyframes spaceStars { from { transform: translateY(0); } to { transform: translateY(-100px); } }

        body { font-family: 'Pretendard', sans-serif; margin: 0; transition: all 0.5s; line-height: 1.6; min-height: 100vh; color: var(--text-primary); }
        header { 
            background-color: var(--header-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        header h1 { font-family: 'Noto Serif KR', serif; margin: 0; font-size: 2.2em; color: var(--accent-color); display: flex; align-items: center; justify-content: center; gap: 12px; }
        #headerIcon { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .mode-toggle { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 12px; cursor: pointer; color: var(--text-primary); font-size: 0.85em; backdrop-filter: blur(5px); }
        
        .container { width: 95%; max-width: 1100px; margin: 30px auto 60px; padding: 0 20px; }
        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 28px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: all 0.3s; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85em; color: var(--text-secondary); }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-primary); font-size: 1em; outline: none; transition: all 0.2s; }
        
        .coffee-btn { width: 100%; background: linear-gradient(135deg, #713f12 0%, #451a03 100%); color: #fef3c7; border: none; padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-calc { width: 100%; background: var(--accent-color); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 1.1em; font-weight: 800; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        
        .res-box { padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 15px; }
        .res-value { font-size: 1.8em; font-weight: 800; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; border-radius: 20px; overflow: hidden; }
        
        #comparisonBanner { display: none; margin-top: 24px; padding: 25px; background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #78350f; border-radius: 20px; text-align: center; animation: slideUp 0.5s ease-out; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .money-particle { position: fixed; top: -50px; font-size: 24px; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #customAlert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); max-width: 450px; width: 85%; text-align: center; border: 1px solid var(--border-color); transform: scale(0.8); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; color: var(--text-primary) !important; }
        #customAlert.active .modal-content { transform: scale(1); opacity: 1; }
    </style>
</head>
<body>
    <div id="customAlert"><div class="modal-content"><div class="modal-title" id="modalTitle" style="font-size:1.5em; font-weight:800; color:#ef4444; margin-bottom:15px;">⚠️ 알림</div><div class="modal-msg" id="modalMsg" style="margin-bottom:25px;"></div><button class="btn-modal" onclick="closeAlert()" style="background:var(--accent-color); color:#fff; border:none; padding:12px 40px; border-radius:12px; font-weight:700; cursor:pointer;">알겠어요!</button></div></div>
    
    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1><span id="headerIcon">🌱</span> 간편한 복리 계산기</h1>
        <p style="opacity:0.8; font-size:0.9em; margin:5px 0 0 0;">복리의 마법으로 당신의 미래를 시뮬레이션하세요</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <aside class="card">
                <button class="coffee-btn" onclick="setCoffeeMiracle()">☕ 커피 한 잔의 기적</button>
                <div class="input-group"><label>초기 투자액 (원)</label><input type="text" id="principal" value="10.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>월 추가 적립액 (원)</label><input type="text" id="monthly" value="1.000.000" oninput="handleInput(this)"></div>
                <div class="input-group"><label>연 예상 수익률 (%)</label><input type="number" id="rate" value="8" step="0.1" oninput="calculate()"></div>
                <div class="input-group"><label>투자 기간 (년)</label><input type="number" id="years" value="10" oninput="calculate()"></div>
                <div class="input-group"><label>연 물가상승률 (%)</label><input type="number" id="inflation" value="2.5" step="0.1" oninput="calculate()"></div>
                <div class="input-group"><label>세제 혜택</label><select id="taxType" onchange="calculate()"><option value="general">일반 과세 (15.4%)</option><option value="isa">ISA/비과세 (0%)</option><option value="pension">연금저축 (과세이연)</option></select></div>
                <button class="btn-calc" onclick="playCalc()">계산하기 💰</button>
            </aside>
            <main class="card">
                <div class="result-header">
                    <div class="res-box">
                        <div class="res-label" style="font-size:0.85em; opacity:0.8;">최종 세후 명목 자산</div>
                        <div class="res-value val-nominal" id="totalValue">₩ 0</div>
                        <div id="rankBadge" style="display:none; padding:4px 12px; background:#fbbf24; color:#78350f; border-radius:20px; font-size:0.75em; font-weight:800; margin-top:8px;"></div>
                    </div>
                    <div class="res-box" style="border-color: var(--real-value-color)">
                        <div class="res-label" style="font-size:0.85em; opacity:0.8;">물가 반영 실질 구매력 (현재 가치)</div>
                        <div class="res-value val-real" id="realValue">₩ 0</div>
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:15px;">
                            <div style="padding:10px; background:rgba(0,0,0,0.05); border-radius:12px; text-align:center;"><span style="display:block; opacity:0.7; font-size:0.7em;">USD</span><span id="valUSD" style="font-weight:700; font-size:0.9em;">$0</span></div>
                            <div style="padding:10px; background:rgba(0,0,0,0.05); border-radius:12px; text-align:center;"><span style="display:block; opacity:0.7; font-size:0.7em;">JPY</span><span id="valJPY" style="font-weight:700; font-size:0.9em;">¥0</span></div>
                            <div style="padding:10px; background:rgba(0,0,0,0.05); border-radius:12px; text-align:center;"><span style="display:block; opacity:0.7; font-size:0.7em;">BTC</span><span id="valBTC" style="font-weight:700; font-size:0.9em;">0₿</span></div>
                        </div>
                    </div>
                </div>
                <div id="comparisonBanner"><div class="banner-title" id="bannerTitle"></div><div class="banner-desc" id="bannerDesc"></div></div>
                <div class="chart-container"><canvas id="assetChart"></canvas></div>
                <div id="quoteBox" style="margin-top:24px; padding:15px; border-left:4px solid var(--accent-color); background:rgba(37,99,235,0.05); font-style:italic; font-size:0.9em; border-radius:0 12px 12px 0;"></div>
            </main>
        </div>
    </div>
    <script>
        const $ = id => document.getElementById(id);
        const els = { principal: $('principal'), monthly: $('monthly'), rate: $('rate'), years: $('years'), inflation: $('inflation'), taxType: $('taxType'), totalValue: $('totalValue'), realValue: $('realValue'), modal: $('customAlert'), modalTitle: $('modalTitle'), modalMsg: $('modalMsg'), banner: $('comparisonBanner'), quote: $('quoteBox'), rank: $('rankBadge'), valUSD: $('valUSD'), valJPY: $('valJPY'), valBTC: $('valBTC'), hIcon: $('headerIcon') };
        let myChart = null, prankCounter = 0, unlocked = false, isModalActive = false, lastTier = '';
        const prankMessages = ["더이상은 안되지롱 😜", "🛡️ 여기까지다!", "에베베~ 😝", "😭 서버가 울어요", "🚀 화성 가자!", "✋ 멈춰!"];
        const quotes = ["인내심은 부를 일구는 가장 강력한 도구다.", "복리는 세계 8대 불가사의다.", "투자의 제1원칙은 돈을 잃지 않는 것이다.", "오늘 심은 나무가 내일 그늘을 만들어준다.", "가장 좋은 투자 시기는 바로 '지금'이다."];

        function playCalc() { playCoinSound(); calculate(); }
        function playCoinSound() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); } catch(e) {} }
        function setCoffeeMiracle() { els.principal.value = "0"; els.monthly.value = "150.000"; els.rate.value = "10"; els.years.value = "30"; calculate(); showAlert("매일 커피 한 잔을 아껴 30년 투자하면 어떤 일이 벌어질까요?", "☕ 커피의 기적"); }
        function toggleMode() { document.body.classList.toggle('dark-mode'); $('modeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode'; calculate(); }
        function showAlert(msg, title = "⚠️ 알림") { if (isModalActive) return; isModalActive = true; document.activeElement.blur(); els.modalTitle.innerText = title; els.modalMsg.innerText = msg; els.modal.style.display = 'flex'; setTimeout(() => els.modal.classList.add('active'), 10); if (!unlocked && ++prankCounter === 10) { setTimeout(() => { isModalActive = false; unlocked = true; showAlert("끈질기시네요! 제가 졌습니다. 🏳️ '자' 단위까지 허용해드릴게요.", "🏳️ 항복 선언"); }, 500); } }
        function closeAlert() { els.modal.classList.remove('active'); setTimeout(() => { els.modal.style.display = 'none'; isModalActive = false; }, 200); }
        const fmtDots = n => Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const getVal = el => parseFloat(el.value.replace(/\./g, "")) || 0;
        function handleInput(el) { if (isModalActive) return; let val = el.value.replace(/[^0-9]/g, ""); const limit = unlocked ? 28 : 24; if (val.length > limit) { showAlert(unlocked ? "이제 그만... 제발요! 😭" : prankMessages[Math.floor(Math.random() * prankMessages.length)]); val = val.substring(0, limit); } el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, "."); calculate(); }
        function formatCurrency(num) { if (num < 10000) return '₩ ' + fmtDots(num); const units = ['', '만', '억', '조', '경', '해', '자', '양']; let parts = [], temp = num, idx = 0; while (temp > 0.9 && idx < units.length) { let rem = Math.floor(temp % 10000); if (rem > 0) parts.push(fmtDots(rem) + units[idx]); temp /= 10000; idx++; } return parts.reverse().slice(0, 2).join(' ') + ' 원'; }
        
        function triggerMoneyShower() {
            const emojis = ['💰', '💵', '⭐', '💎', '🪙'];
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const el = document.createElement('div'); el.className = 'money-particle'; el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw'; el.style.animationDuration = (Math.random() * 2 + 1) + 's'; el.style.opacity = Math.random();
                    document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
                }, i * 50);
            }
        }

        function updateTierTheme(val) {
            let currentTier = '', icon = '🌱';
            if (val >= 1e24) { currentTier = 'theme-ja'; icon = '🪐'; }
            else if (val >= 1e12) { currentTier = 'theme-jo'; icon = '🌍'; }
            else if (val >= 1e8) { currentTier = 'theme-eok'; icon = '🏢'; }
            else if (val >= 1e6) icon = '🐷';
            else icon = '🌱';
            els.hIcon.innerText = icon;
            if (currentTier !== lastTier) {
                if ((currentTier === 'theme-jo' || currentTier === 'theme-ja') && lastTier !== '') triggerMoneyShower();
                document.body.classList.remove('theme-eok', 'theme-jo', 'theme-ja');
                if (currentTier) document.body.classList.add(currentTier);
                lastTier = currentTier;
            }
        }

        function updateComparison(val) {
            els.banner.style.display = 'block'; let t = '', d = '', bg = '', c = '#78350f';
            if (val < 100000) { t = "🌱 시작은 미미하지만.."; d = "티끌 모아 태산! 지금 이 습관이 당신을 부자로 만듭니다."; bg = "linear-gradient(135deg, #dcfce7 0%, #86efac 100%)"; }
            else if (val < 1000000) { t = "💪 차곡차곡 쌓이는 중!"; d = "십만 원이 백만 원 되고, 백만 원이 천만 원 됩니다. 응원해요!"; bg = "linear-gradient(135deg, #fef9c3 0%, #fde047 100%)"; }
            else if (val >= 1e24) { t = "🌌 우주 정거장 집주인"; d = `지구를 ${fmtDots(val / 1e18)}개 사고 달에 신도시를 건설할 수 있습니다.`; bg = "linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%)"; c = "#fff"; }
            else if (val >= 1e20) { t = "🌍 지구의 실질적 주인"; d = "전 세계 GDP를 합친 것보다 많습니다. 당신이 곧 법입니다."; bg = "linear-gradient(135deg, #064e3b 0%, #10b981 100%)"; c = "#fff"; }
            else if (val >= 1e12) { t = "👑 재벌 3세 저리가라"; d = "대기업 몇 개쯤은 쇼핑하듯 살 수 있는 엄청난 금액입니다."; bg = "linear-gradient(135deg, #4c1d95 0%, #8b5cf6 100%)"; c = "#fff"; }
            else if (val >= 1e9) { t = "🏢 강남 건물주 등극!"; d = "축하합니다! 이제 강남 요지에 빌딩 한 채 정도는 가볍게 소유하시겠네요."; bg = "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)"; }
            else { els.banner.style.display = 'none'; return; }
            $('bannerTitle').innerText = t; $('bannerDesc').innerText = d; els.banner.style.background = bg; els.banner.style.color = c;
        }

        function calculate() {
            const P = getVal(els.principal), PMT = getVal(els.monthly), limit = unlocked ? 1e28 : 1e24;
            if (P >= limit || PMT >= limit) return showAlert("한계를 넘볼 수 없습니다!");
            let cur = P, totalP = P, totalT = 0; const years = parseInt(els.years.value) || 0, mRate = (getVal(els.rate) / 100) / 12, tRate = els.taxType.value === 'general' ? 0.154 : 0, labels = ['현재'], dNom = [P], dReal = [P], dPriz = [P];
            for (let y = 1; y <= years; y++) { for (let m = 1; m <= 12; m++) { let intr = cur * mRate, tax = intr * tRate; totalT += tax; cur += (intr - tax + PMT); totalP += PMT; if (cur >= limit) return showAlert("지구가 위험해요! 🌍"); } dNom.push(cur); dReal.push(cur / Math.pow(1 + getVal(els.inflation)/100, y)); dPriz.push(totalP); labels.push(y + '년'); }
            els.totalValue.innerText = formatCurrency(cur); els.realValue.innerText = formatCurrency(dReal[dReal.length-1]);
            els.valUSD.innerText = '$' + fmtDots(cur / 1350); els.valJPY.innerText = '¥' + fmtDots(cur / 9); els.valBTC.innerText = (cur / 95000000).toFixed(4) + '₿';
            if (cur >= 1000000) { els.rank.style.display = 'inline-block'; if (cur >= 300e12) els.rank.innerText = "일론 머스크 능가! 🚀"; else if (cur >= 150e12) els.rank.innerText = "워런 버핏급! 🐢"; else if (cur >= 13e8) els.rank.innerText = "상위 1% 부자! 💎"; else els.rank.innerText = "대한민국 저력! 👍"; } else { els.rank.style.display = 'none'; }
            els.quote.innerText = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"'; updateTierTheme(cur); updateComparison(cur); updateChart(labels, dNom, dReal, dPriz);
        }

        function updateChart(labels, nominal, real, principal) {
            const useLightText = document.body.classList.contains('dark-mode') || document.body.classList.contains('theme-jo') || document.body.classList.contains('theme-ja');
            const tCol = useLightText ? '#cbd5e1' : '#4b5563', gCol = useLightText ? 'rgba(255,255,255,0.1)' : '#e5e7eb';
            const ctx = $('assetChart').getContext('2d'); if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: '명목 자산', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 }, { label: '실질 가치', data: real, borderColor: '#db2777', borderDash: [5, 5], tension: 0.3 }, { label: '투자 원금', data: principal, borderColor: useLightText ? '#94a3b8' : '#9ca3af', borderWidth: 2, tension: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: tCol, font: { weight: 'bold' } } }, tooltip: { callbacks: { label: c => (c.dataset.label + ': ' + formatCurrency(c.parsed.y)) } } }, scales: { x: { grid: { color: gCol }, ticks: { color: tCol } }, y: { grid: { color: gCol }, ticks: { color: tCol, callback: v => v >= 1e12 ? (v / 1e12).toFixed(1) + '조' : v >= 1e8 ? (v / 1e8).toFixed(1) + '억' : v >= 1e4 ? (v / 1e4).toFixed(1) + '만' : v } } }, interaction: { intersect: false, mode: 'index' } } });
        }
        calculate();
    </script>
</body>
</html>
