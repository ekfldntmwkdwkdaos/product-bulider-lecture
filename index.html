<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneCalc Pro - 복리 & 절세 계산기</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600;700&display=swap');

        :root {
            --bg-color: #f3f4f6;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent-color: #2563eb;
            --real-value-color: #db2777;
            --tax-color: #059669;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --header-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --real-value-color: #f472b6;
            --tax-color: #34d399;
            --border-color: #334155;
            --input-bg: #0f172a;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        header { 
            background-color: var(--header-bg); 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 { 
            font-family: 'Noto Serif KR', serif;
            margin: 0; font-size: 2.2em; 
            color: var(--accent-color);
        }

        .mode-toggle {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid var(--border-color); 
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-primary); font-size: 0.85em;
        }

        .container { width: 95%; max-width: 1100px; margin: 20px auto 60px; padding: 0 20px; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
        @media (max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }

        .card { 
            background-color: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85em; color: var(--text-secondary); }
        .input-group input, .input-group select { 
            width: 100%; padding: 10px 12px; border-radius: 10px; 
            border: 1px solid var(--border-color); 
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1em; box-sizing: border-box;
            outline: none;
        }

        .tax-box {
            background-color: rgba(37, 99, 235, 0.05);
            padding: 16px; border-radius: 12px; border: 1px solid rgba(37, 99, 235, 0.1);
            margin-top: 20px;
        }

        .btn-calc {
            width: 100%; background-color: var(--accent-color); color: white;
            border: none; padding: 16px; border-radius: 12px; font-size: 1.1em;
            font-weight: 700; cursor: pointer; transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-calc:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* 결과 영역 */
        .result-header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 600px) { .result-header { grid-template-columns: 1fr; } }

        .res-box { padding: 20px; border-radius: 16px; background: rgba(0,0,0,0.02); border: 1px solid var(--border-color); }
        .res-label { font-size: 0.85em; color: var(--text-secondary); margin-bottom: 4px; }
        .res-value { font-size: 1.8em; font-weight: 800; }
        .val-nominal { color: var(--accent-color); }
        .val-real { color: var(--real-value-color); }

        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .stat-small { font-size: 0.85em; }
        .stat-small .label { color: var(--text-secondary); }
        .stat-small .value { display: block; font-weight: 700; font-size: 1.1em; }

        .tax-info { font-size: 0.8em; color: var(--text-secondary); margin-top: 15px; background: #fffbeb; padding: 10px; border-radius: 8px; border: 1px solid #fef3c7; color: #92400e; }
        body.dark-mode .tax-info { background: #451a03; color: #fde68a; border-color: #78350f; }

        /* 비교 배너 스타일 */
        #comparisonBanner {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        .banner-title { font-weight: 800; font-size: 1.1em; margin-bottom: 8px; }
        .banner-desc { font-size: 0.9em; opacity: 0.9; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 커스텀 모달 스타일 */
        #customAlert {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 400px;
            width: 80%;
            text-align: center;
            border: 1px solid var(--border-color);
            transform: scale(0.9);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        #customAlert.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }
        .modal-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 15px;
        }
        .modal-msg {
            color: var(--text-primary);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-modal {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-modal:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div id="customAlert">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">⚠️ 시스템 알림</div>
            <div class="modal-msg" id="modalMsg">메시지 내용이 이곳에 표시됩니다.</div>
            <button class="btn-modal" onclick="closeAlert()">확인</button>
        </div>
    </div>

    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1>FortuneCalc Pro</h1>
        <p>복리, 인플레이션, 그리고 세금까지 고려한 실질 자산 시뮬레이션</p>
    </header>

    <div class="container">
        <div class="main-grid">
            <!-- 설정 패널 -->
            <aside class="card">
                <div class="input-group">
                    <label>초기 투자액 (원)</label>
                    <input type="text" id="principal" value="10.000.000" oninput="handleInput(this)">
                </div>
                <div class="input-group">
                    <label>월 추가 적립액 (원)</label>
                    <input type="text" id="monthly" value="1.000.000" oninput="handleInput(this)">
                </div>
                <div class="input-group">
                    <label>연 예상 수익률 (%)</label>
                    <input type="number" id="rate" value="8" step="0.1" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>투자 기간 (년)</label>
                    <input type="number" id="years" value="10" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>연 물가상승률 (%)</label>
                    <input type="number" id="inflation" value="2.5" step="0.1" oninput="calculate()">
                </div>

                <div class="tax-box">
                    <div class="input-group" style="margin-bottom:0">
                        <label style="color:var(--accent-color)">🇰🇷 대한민국 세제 혜택 선택</label>
                        <select id="taxType" onchange="calculate()">
                            <option value="general">일반 과세 (15.4%)</option>
                            <option value="isa">ISA/비과세 (0% 가정)</option>
                            <option value="pension">연금저축/IRP (과세이연)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-calc" onclick="calculate()">결과 시뮬레이션</button>
                
                <div class="tax-info">
                    * 일반 과세는 이자 및 배당소득세 15.4%를 매년 차감하는 방식으로 계산됩니다. ISA 등은 중도 해지 조건에 따라 실제 결과가 다를 수 있습니다.
                </div>
            </aside>

            <!-- 결과 및 차트 패널 -->
            <main class="card">
                <div class="result-header">
                    <div class="res-box">
                        <div class="res-label">최종 세후 명목 자산</div>
                        <div class="res-value val-nominal" id="totalValue">₩ 0</div>
                    </div>
                    <div class="res-box" style="border-color: var(--real-value-color)">
                        <div class="res-label">물가 반영 실질 구매력 (현재 가치)</div>
                        <div class="res-value val-real" id="realValue">₩ 0</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="assetChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-small">
                        <span class="label">총 투자 원금</span>
                        <span class="value" id="statPrincipal">₩ 0</span>
                    </div>
                    <div class="stat-small">
                        <span class="label">납부 예상 세금</span>
                        <span class="value" style="color: #ef4444" id="statTax">₩ 0</span>
                    </div>
                    <div class="stat-small">
                        <span class="label">실질 수익금</span>
                        <span class="value" id="statProfit">₩ 0</span>
                    </div>
                    <div class="stat-small">
                        <span class="label">실질 수익률</span>
                        <span class="value" id="statReturn">0%</span>
                    </div>
                </div>

                <div id="comparisonBanner">
                    <div class="banner-title" id="bannerTitle">상상도 못한 금액!</div>
                    <div class="banner-desc" id="bannerDesc">비교 데이터가 표시됩니다.</div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let myChart = null;
        let prankCounter = 0;
        let unlocked = false;
        let isModalActive = false; // 모달 활성화 상태 변수

        const prankMessages = [
            "더이상은 안되지롱 😜", "훗 넌 더이상 나아갈수 없어 🛡️", "또 누르시게요? 에베베~ 😝",
            "손가락이 근질근질하시죠? 🖐️", "지구 정복이 꿈이신가요? 🌍", "숫자가 너무 커서 서버가 울고 있어요.. 😭",
            "이정도면 거의 신의 영역인데요? 😇", "적당히 하세요, 현기증 난단 말이에요! 😵",
            "숫자로 우주 만드시게요? 🌌", "와우, 이 돈이면 화성도 사겠어요! 🚀",
            "장난은 여기까지만~ 🙅", "끈기가 대단하시네요! 👍", "제 계산기가 파업 직전입니다. 🛠️",
            "그만! 더 이상은 0이 부족해요. 🕳️", "혹시 빌 게이츠세요? 💰", "이 숫자는 저도 처음 봐요.. 🧐",
            "멈춰! (정색) ✋", "아직도 포기 안 하셨나요? 끈기왕! 👑", "당신의 열정에 박수를 보냅니다. 👏"
        ];

        function toggleMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            document.getElementById('modeBtn').innerHTML = body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
            calculate(); 
        }

        function showAlert(msg, title = "⚠️ 시스템 알림") {
            if (isModalActive) return; // 이미 팝업이 떠 있으면 중복 호출 방지
            
            isModalActive = true;
            document.activeElement.blur(); // 현재 입력 중인 필드의 포커스 해제 (키보드 입력 중단)
            
            const modal = document.getElementById('customAlert');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            
            if (!unlocked) prankCounter++;
            
            if (prankCounter === 10 && !unlocked) {
                setTimeout(() => {
                    // 항복 선언 시 상태 초기화 후 다시 띄우기 위해 일시적으로 해제
                    isModalActive = false; 
                    unlocked = true;
                    showAlert("아... 진짜 끈질기시네요. 제가 졌습니다! 🏳️\n딱 '자' 단위까지만 특별히 열어드릴게요. 이 정도면 만족하시죠?", "🏳️ 항복 선언");
                }, 500);
            }
        }

        function closeAlert() {
            const modal = document.getElementById('customAlert');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                isModalActive = false; // 팝업이 완전히 닫힌 후 상태 해제
            }, 200);
        }

        function formatWithDots(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function handleInput(el) {
            if (isModalActive) return; // 팝업이 떠 있는 동안에는 모든 입력 처리 무시

            let value = el.value.replace(/[^0-9]/g, "");
            const limit = unlocked ? 28 : 24;
            
            if (value.length > limit) {
                if (unlocked) {
                    showAlert("훗... 넌 더 이상 나아갈 수 없어! '자' 단위도 부족하신가요? 🛑");
                } else {
                    const msg = prankMessages[Math.floor(Math.random() * prankMessages.length)];
                    showAlert(msg);
                }
                // 제한 길이까지만 자르기
                value = value.substring(0, limit);
            }
            
            el.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            calculate();
        }

        function formatCurrency(num) {
            if (num === 0) return '₩ 0';
            if (num < 10000) return '₩ ' + formatWithDots(num);

            const units = ['', '만', '억', '조', '경', '해', '자', '양'];
            let tempNum = num; 
            let unitIdx = 0;

            const parts = [];
            while (tempNum > 0.9 && unitIdx < units.length) {
                const remainder = Math.floor(tempNum % 10000);
                if (remainder > 0) {
                    parts.push(formatWithDots(remainder) + units[unitIdx]);
                }
                tempNum = tempNum / 10000;
                unitIdx++;
            }

            const displayParts = parts.reverse().slice(0, 2);
            return displayParts.join(' ') + ' 원';
        }

        function updateComparison(val) {
            const banner = document.getElementById('comparisonBanner');
            const title = document.getElementById('bannerTitle');
            const desc = document.getElementById('bannerDesc');

            if (val >= 1e20) {
                banner.style.display = 'block';
                if (val >= 1e24) {
                    title.innerText = "🌌 우주를 지배하는 자!";
                    desc.innerText = `현재 자산으로 지구(Earth)를 약 ${formatWithDots(val / 1e18)}개 살 수 있습니다. 전 우주에 치킨을 쏠 수 있는 금액이에요!`;
                } else {
                    title.innerText = "🌍 지구급 부의 탄생!";
                    desc.innerText = `이 정도면 전 세계 모든 사람에게 아파트를 한 채씩 선물하고도 남는 금액입니다.`;
                }
            } else {
                banner.style.display = 'none';
            }
        }

        function calculate() {
            const principalRaw = document.getElementById('principal').value.replace(/\./g, "");
            const monthlyRaw = document.getElementById('monthly').value.replace(/\./g, "");
            
            const P = parseFloat(principalRaw) || 0;
            const PMT = parseFloat(monthlyRaw) || 0;
            const annualRate = (parseFloat(document.getElementById('rate').value) || 0) / 100;
            const years = parseInt(document.getElementById('years').value) || 0;
            const inflationRate = (parseFloat(document.getElementById('inflation').value) || 0) / 100;
            const taxType = document.getElementById('taxType').value;

            const limit = unlocked ? 1e28 : 1e24;
            if (P >= limit || PMT >= limit) {
                showAlert(unlocked ? "이제 그만하세요... 제 인내심이 바닥났어요! 😭" : "이런 장난꾸러기! 해 단위를 넘볼 순 없습니다.");
                return;
            }

            const labels = [];
            const dataNominal = [];
            const dataReal = [];
            const dataPrincipal = [];

            let currentAsset = P;
            let totalPrincipal = P;
            let totalTaxPaid = 0;
            const monthlyRate = annualRate / 12;
            const taxRate = taxType === 'general' ? 0.154 : 0; 

            labels.push('현재');
            dataNominal.push(P);
            dataReal.push(P);
            dataPrincipal.push(P);

            for (let year = 1; year <= years; year++) {
                for (let month = 1; month <= 12; month++) {
                    const interest = currentAsset * monthlyRate;
                    const tax = interest * taxRate;
                    totalTaxPaid += tax;
                    currentAsset += (interest - tax + PMT);
                    totalPrincipal += PMT;

                    if (currentAsset >= limit) {
                        showAlert(unlocked ? "자 단위도 돌파하다니... 당신의 끈기에 경의를 표합니다. 🫡" : "계산 결과가 해 단위를 초과하여 중단합니다. 지구가 위험해요! 🌍");
                        return;
                    }
                }
                const realValue = currentAsset / Math.pow(1 + inflationRate, year);
                labels.push(year + '년');
                dataNominal.push(currentAsset);
                dataReal.push(realValue);
                dataPrincipal.push(totalPrincipal);
            }

            document.getElementById('totalValue').innerText = formatCurrency(currentAsset);
            document.getElementById('realValue').innerText = formatCurrency(dataReal[dataReal.length-1]);
            document.getElementById('statPrincipal').innerText = formatCurrency(totalPrincipal);
            document.getElementById('statTax').innerText = formatCurrency(totalTaxPaid);
            document.getElementById('statProfit').innerText = formatCurrency(currentAsset - totalPrincipal);
            document.getElementById('statReturn').innerText = (((currentAsset - totalPrincipal) / totalPrincipal) * 100).toFixed(1) + '%';

            updateChart(labels, dataNominal, dataReal, dataPrincipal);
            updateComparison(currentAsset);
        }

        function updateChart(labels, nominal, real, principal) {
            const ctx = document.getElementById('assetChart').getContext('2d');
            const isDark = document.body.classList.contains('dark-mode');
            const textColor = isDark ? '#94a3b8' : '#4b5563';
            const gridColor = isDark ? '#334155' : '#e5e7eb';
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '명목 자산 (세후)', data: nominal, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 },
                        { label: '실질 가치 (물가반영)', data: real, borderColor: '#db2777', borderDash: [5, 5], fill: false, tension: 0.3 },
                        { label: '투자 원금', data: principal, borderColor: isDark ? '#64748b' : '#9ca3af', backgroundColor: 'transparent', fill: false, borderWidth: 2, tension: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { color: textColor, font: { family: 'Pretendard' } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) label += formatCurrency(context.parsed.y);
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: gridColor }, ticks: { color: textColor } },
                        y: { 
                            grid: { color: gridColor }, 
                            ticks: { 
                                color: textColor,
                                callback: function(value) { 
                                    if (value >= 1e24) return (value / 1e24).toFixed(1) + '자';
                                    if (value >= 1e20) return (value / 1e20).toFixed(1) + '해';
                                    if (value >= 1e16) return (value / 1e16).toFixed(1) + '경';
                                    if (value >= 1e12) return (value / 1e12).toFixed(1) + '조';
                                    if (value >= 1e8) return (value / 1e8).toFixed(1) + '억';
                                    return value;
                                }
                            }
                        }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }
        calculate();
    </script>
</body>
