<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneCalc - 복리 효과 계산기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600&display=swap');

        :root {
            --bg-color: #f8f9fa;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #007aff;
            --border-color: #eeeeee;
            --input-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --header-bg: #1e293b;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        header { 
            background-color: var(--header-bg); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        header h1 { 
            font-family: 'Noto Serif KR', serif;
            margin: 0; font-size: 2.5em; 
            letter-spacing: -1px;
            color: var(--accent-color);
        }

        header p { color: var(--text-secondary); margin-top: 10px; font-size: 1.1em; }

        .mode-toggle {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid var(--border-color); 
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            color: var(--text-primary); font-size: 0.9em;
        }

        .container { width: 95%; max-width: 900px; margin: -40px auto 60px; padding: 20px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: var(--text-secondary); }
        .input-group input { 
            width: 100%; padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); 
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1.1em; box-sizing: border-box;
            outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--accent-color); }

        .btn-calc {
            width: 100%; background-color: var(--accent-color); color: white;
            border: none; padding: 18px; border-radius: 12px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }
        .btn-calc:hover { transform: translateY(-2px); opacity: 0.9; }

        .result-card { text-align: left; display: flex; flex-direction: column; justify-content: center; }
        .result-label { color: var(--text-secondary); font-size: 1em; margin-bottom: 5px; }
        .result-value { font-size: 2.8em; font-weight: 800; color: var(--accent-color); margin-bottom: 20px; word-break: break-all; }
        
        .stats { border-top: 1px solid var(--border-color); pt: 20px; margin-top: 20px; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95em; }
        .stat-label { color: var(--text-secondary); }
        .stat-value { font-weight: 600; }

        .info-text { font-size: 0.85em; color: var(--text-secondary); margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <button class="mode-toggle" id="modeBtn" onclick="toggleMode()">🌙 Dark Mode</button>
        <h1>FortuneCalc</h1>
        <p>시간과 이자가 만드는 부의 마법, 복리 계산기</p>
    </header>

    <div class="container">
        <div class="grid">
            <!-- 입력 섹션 -->
            <section class="card">
                <div class="input-group">
                    <label>초기 투자 금액 (원)</label>
                    <input type="number" id="principal" placeholder="예: 10000000" value="10000000">
                </div>
                <div class="input-group">
                    <label>매월 추가 적립 (원)</label>
                    <input type="number" id="monthly" placeholder="예: 1000000" value="1000000">
                </div>
                <div class="input-group">
                    <label>연 수익률 (%)</label>
                    <input type="number" id="rate" placeholder="예: 8" value="8">
                </div>
                <div class="input-group">
                    <label>투자 기간 (년)</label>
                    <input type="number" id="years" placeholder="예: 10" value="10">
                </div>
                <button class="btn-calc" onclick="calculate()">계산하기</button>
            </section>

            <!-- 결과 섹션 -->
            <section class="card result-card" id="resultCard">
                <div class="result-label">최종 예상 자산</div>
                <div class="result-value" id="totalValue">₩ 0</div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">총 투자 원금</span>
                        <span class="stat-value" id="totalPrincipal">₩ 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">누적 이자 수익</span>
                        <span class="stat-value" id="totalInterest">₩ 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">수익률</span>
                        <span class="stat-value" id="returnRate">0%</span>
                    </div>
                </div>
                
                <p class="info-text">
                    * 위 계산 결과는 세전 금액이며, 월 복리(Monthly Compounding) 기준입니다. 실제 투자 수익은 세금 및 거래 비용에 따라 달라질 수 있습니다.
                </p>
            </section>
        </div>
    </div>

    <script>
        function toggleMode() {
            const body = document.body;
            const btn = document.getElementById('modeBtn');
            body.classList.toggle('dark-mode');
            btn.innerHTML = body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        function formatCurrency(num) {
            return new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(Math.floor(num));
        }

        function calculate() {
            const P = parseFloat(document.getElementById('principal').value) || 0;
            const PMT = parseFloat(document.getElementById('monthly').value) || 0;
            const r = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
            const n = (parseFloat(document.getElementById('years').value) || 0) * 12;

            if (n <= 0) return;

            // 복리 계산 공식 (매월 적립 포함)
            // A = P(1+r)^n + PMT * [((1+r)^n - 1) / r]
            let futureValue;
            if (r === 0) {
                futureValue = P + (PMT * n);
            } else {
                const compoundFactor = Math.pow(1 + r, n);
                futureValue = P * compoundFactor + PMT * ((compoundFactor - 1) / r);
            }

            const totalPrincipal = P + (PMT * n);
            const totalInterest = futureValue - totalPrincipal;
            const returnRate = ((futureValue - totalPrincipal) / totalPrincipal) * 100;

            // 결과 화면 업데이트
            document.getElementById('totalValue').innerText = formatCurrency(futureValue);
            document.getElementById('totalPrincipal').innerText = formatCurrency(totalPrincipal);
            document.getElementById('totalInterest').innerText = formatCurrency(totalInterest);
            document.getElementById('returnRate').innerText = returnRate.toFixed(1) + '%';
            
            // 애니메이션 효과
            const card = document.getElementById('resultCard');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => card.style.transform = 'scale(1)', 200);
        }

        // 초기 계산 실행
        calculate();
    </script>

</body>
</html>
